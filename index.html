// ── 7A: full-screen photo lightbox (tap any photo to enlarge) ─────────────
function PhotoLightbox() {
  const [src, setSrc] = React.useState(null);
  React.useEffect(() => {
    const open = (e) => setSrc((e && e.detail) || null);
    const esc = (e) => { if (e.key === 'Escape') setSrc(null); };
    window.addEventListener('fl-photo-open', open);
    window.addEventListener('keydown', esc);
    return () => { window.removeEventListener('fl-photo-open', open); window.removeEventListener('keydown', esc); };
  }, []);
  if (!src) return null;
  return (
    <div onClick={() => setSrc(null)} style={{
      position: 'fixed', inset: 0, zIndex: 9999, background: 'rgba(20,17,15,0.93)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 18, cursor: 'zoom-out',
    }}>

        maxWidth: '100%', maxHeight: '100%', borderRadius: 10, objectFit: 'contain',
        boxShadow: '0 16px 60px rgba(0,0,0,0.55)',
      }} />
      <button aria-label="Close" onClick={() => setSrc(null)} style={{
        position: 'absolute', top: 14, right: 16, width: 38, height: 38, borderRadius: '50%',

// ── 7B: rating-weight defaults + weighted-overall helper (used from 7C) ───

window.computeOverall = function (scores, weights) {
  if (!scores) return null;
  const w = weights || window.DEFAULT_WEIGHTS;
  const tot = (w.food || 0) + (w.value || 0) + (w.vibe || 0) + (w.service || 0);
  if (!tot) return null;
  const v = (scores.food * (w.food || 0) + scores.value * (w.value || 0)
           + scores.vibe * (w.vibe || 0) + scores.service * (w.service || 0)) / tot;
  return Math.round(v * 10) / 10;
};

<script type="text/babel">
// ── inlined from atoms.jsx ──
// atoms.jsx — Editorial rating + label atoms. Shared via window.
// Depends on window.TOKENS, CUISINE_META, STATUS_META, fmt.

const T = () => window.TOKENS;

// hairline rule
function Rule({ color, style }) {
  return <div style={{ height:1, background: color || 'var(--line)', width:'100%', ...style }} />;
}

// kicker label — mono, uppercase, tracked
function KLabel({ children, color, style }) {
  return <span className="kl" style={{ color: color || 'var(--ink-3)', ...style }}>{children}</span>;
}

// cuisine code chip with hue dot
function CuisineDot({ cuisine, showLabel = false, size = 7 }) {
  const m = window.CUISINE_META[cuisine] || { code:'··', dot:'#999' };
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:7 }}>
      <span style={{ width:size, height:size, borderRadius:'50%', background:m.dot, flexShrink:0 }} />
      {showLabel && <span className="sans" style={{ fontSize:12.5, color:'var(--ink-2)' }}>{cuisine}</span>}
    </span>
  );
}

// status indicator — open circle (want) / half (visited) / filled (reviewed)
function StatusDot({ status, size = 11 }) {
  const spot = 'var(--spot)';
  if (status === 'reviewed')
    return <span style={{ width:size, height:size, borderRadius:'50%', background:spot, display:'inline-block', flexShrink:0 }} />;
  if (status === 'visited')
    return (
      <span style={{ width:size, height:size, borderRadius:'50%', border:`1.5px solid ${T().ink2}`,
        background:`linear-gradient(90deg, ${T().ink2} 50%, transparent 50%)`, display:'inline-block', flexShrink:0 }} />
    );
  return <span style={{ width:size, height:size, borderRadius:'50%', border:`1.5px solid var(--ink-3)`, display:'inline-block', flexShrink:0 }} />;
}

function StatusTag({ status }) {
  const m = window.STATUS_META[status];
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:7 }}>
      <StatusDot status={status} />
      <span className="kl" style={{ color: status==='reviewed' ? 'var(--spot)' : 'var(--ink-2)' }}>{m.label}</span>
    </span>
  );
}

// price level — filled / outlined dollar marks
function PriceLevel({ level, size = 13, color }) {
  const c = color || 'var(--ink)';
  return (
    <span className="mono" style={{ display:'inline-flex', gap:1, fontSize:size, fontWeight:500, letterSpacing:'-0.02em' }}>
      {[1,2,3,4].map(i => (
        <span key={i} style={{ color: i <= level ? c : 'var(--line)' }}>$</span>
      ))}
    </span>
  );
}

// would-return tag
function AgainTag({ again, compact = false }) {
  if (again == null) return null;
  const yes = again;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5 }}>
      <svg width="12" height="12" viewBox="0 0 12 12" style={{ flexShrink:0 }}>
        {yes
          ? <path d="M2.5 6.3l2.3 2.4 4.7-5" stroke={T().green} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          : <path d="M3 3l6 6M9 3l-6 6" stroke={T().ink3} strokeWidth="1.6" strokeLinecap="round"/>}
      </svg>
      <span className="kl" style={{ color: yes ? T().green : 'var(--ink-3)' }}>
        {compact ? (yes ? 'Again' : 'Pass') : (yes ? 'Go again' : 'Skip next')}
      </span>
    </span>
  );
}

// score tier label
function scoreTier(v) {
  if (v == null) return '—';
  if (v >= 9.5) return 'Exceptional';
  if (v >= 9.0) return 'Outstanding';
  if (v >= 8.5) return 'Excellent';
  if (v >= 8.0) return 'Great';
  if (v >= 7.0) return 'Good';
  if (v >= 6.0) return 'Decent';
  return 'Pass';
}

// single axis meter — label, thin track w/ fill, mono number
function Meter({ label, value, max = 10, accent, height = 4, weight, avg }) {
  const pct = Math.max(0, Math.min(1, value / max)) * 100;
  const fill = accent || 'var(--ink)';
  const avgPct = avg != null ? Math.max(0, Math.min(1, avg / max)) * 100 : null;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12 }}>
      <span className="sans" style={{ fontSize:12.5, color:'var(--ink-2)', width:58, flexShrink:0 }}>
        {label}{weight ? <span className="num" style={{ fontSize:9, color:'var(--ink-3)', marginLeft:4 }}>{weight}%</span> : null}
      </span>
      <div style={{ flex:1, height, background:'var(--line-2)', borderRadius:height, position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', inset:0, width:`${pct}%`, background:fill, borderRadius:height, transition:'width 0.3s ease' }} />
        {avgPct != null && (
          <div style={{ position:'absolute', top:-1, bottom:-1, left:`${avgPct}%`, width:1.5, background:'var(--ink-3)', opacity:0.5 }} />
        )}
      </div>
      <span className="num" style={{ fontSize:12.5, color:'var(--ink)', width:26, textAlign:'right', flexShrink:0 }}>
        {value.toFixed(1)}
      </span>
    </div>
  );
}

// the four-axis score grid — now with optional weights and average comparison
const AXIS_WEIGHTS = { food:40, value:20, vibe:20, service:20 };
const AXIS_ORDER = ['food','value','vibe','service'];

function ScoreGrid({ s, accent = 'var(--spot)', gap = 11, showWeights = false, avgScores }) {
  if (!s) return null;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap }}>
      {AXIS_ORDER.map(k => (
        <Meter key={k}
          label={window.fmt.axis(k)}
          value={s[k]}
          accent={accent}
          weight={showWeights ? AXIS_WEIGHTS[k] : undefined}
          avg={avgScores ? avgScores[k] : undefined}
        />
      ))}
    </div>
  );
}

// weighted overall calculator
function calcWeighted(s, weights) {
  if (!s) return null;
  const w = weights || AXIS_WEIGHTS;
  const tot = (w.food||0)+(w.value||0)+(w.vibe||0)+(w.service||0);
  if (!tot) return null;
  return (s.food*(w.food||0) + s.value*(w.value||0) + s.vibe*(w.vibe||0) + s.service*(w.service||0)) / tot;
}

// weight breakdown strip — shows how each axis contributes to the overall
function WeightStrip({ s, weights }) {
  if (!s) return null;
  const w = weights || AXIS_WEIGHTS;
  const wtot = (w.food||0)+(w.value||0)+(w.vibe||0)+(w.service||0) || 1;
  const total = calcWeighted(s, w);
  const contribs = AXIS_ORDER.map(k => ({
    k, label: window.fmt.axis(k), w: w[k],
    contrib: s[k] * (w[k] / wtot),
    max: 10 * (w[k] / wtot),
    pct: (s[k] * (w[k] / wtot)) / total * 100,
  }));
  const fmtMark = (n) => { const r = Math.round(n * 10) / 10; return Number.isInteger(r) ? String(r) : r.toFixed(1); };
  const colors = { food:'var(--spot)', value:'var(--gold)', vibe:'var(--green)', service:'var(--ink-2)' };
  return (
    <div>
      <div style={{ display:'flex', borderRadius:6, overflow:'hidden', height:8 }}>
        {contribs.map(c => (
          <div key={c.k} style={{ width:`${c.pct}%`, background:colors[c.k], transition:'width 0.3s ease' }} />
        ))}
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', marginTop:8 }}>
        {contribs.map(c => (
          <div key={c.k} style={{ textAlign:'center' }}>
            <div style={{ display:'flex', alignItems:'center', gap:4, justifyContent:'center' }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:colors[c.k] }} />
              <span className="kl" style={{ fontSize:9 }}>{c.label}</span>
            </div>
            <span className="num" style={{ fontSize:11, color:'var(--ink)', fontWeight:600 }}>{fmtMark(c.contrib)}<span style={{ color:'var(--ink-3)', fontWeight:400 }}>/{fmtMark(c.max)}</span></span>
          </div>
        ))}
      </div>
    </div>
  );
}

// big editorial overall score — now with tier label
function OverallBadge({ value, size = 64, sub = 'Overall', align = 'flex-start', showTier = false }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:align, lineHeight:1 }}>
      <span className="num" style={{ fontSize:size, fontWeight:600, color:'var(--ink)', letterSpacing:'-0.03em' }}>
        {value == null ? '—' : value.toFixed(1)}
      </span>
      {showTier && value != null && (
        <span className="serif" style={{ fontSize:Math.max(12, size*0.22), color:'var(--spot)', fontWeight:500, fontStyle:'italic', marginTop:4 }}>
          {scoreTier(value)}
        </span>
      )}
      {sub && <span className="kl" style={{ marginTop:6 }}>{sub} · out of 10</span>}
    </div>
  );
}

// radar/spider chart — now supports comparison overlay (avgScores)
function Radar({ s, size = 132, accent = 'var(--spot)', avgScores }) {
  if (!s) return null;
  const axes = ['food','value','vibe','service'];
  const cx = size/2, cy = size/2, r = size/2 - 16;
  const ang = (i) => (Math.PI*2*i/4) - Math.PI/2;
  const pt = (i, val) => [cx + Math.cos(ang(i))*r*(val/10), cy + Math.sin(ang(i))*r*(val/10)];
  const poly = axes.map((k,i) => pt(i, s[k]).join(',')).join(' ');
  const ringPts = (f) => axes.map((_,i)=>[cx+Math.cos(ang(i))*r*f, cy+Math.sin(ang(i))*r*f].join(',')).join(' ');
  const labels = ['Food','Value','Vibe','Service'];
  const avgPoly = avgScores ? axes.map((k,i) => pt(i, avgScores[k]).join(',')).join(' ') : null;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ overflow:'visible' }}>
      {/* grid rings */}
      {[0.25,0.5,0.75,1].map((f,i)=>(
        <polygon key={i} points={ringPts(f)} fill="none" stroke="var(--line)" strokeWidth={f===1?"0.9":"0.5"}/>
      ))}
      {/* axis lines */}
      {axes.map((_,i)=>{
        const [x,y]=pt(i,10);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--line-2)" strokeWidth="0.5"/>;
      })}
      {/* avg comparison ghost */}
      {avgPoly && (
        <polygon points={avgPoly} fill="var(--ink-3)" fillOpacity="0.06" stroke="var(--ink-3)" strokeWidth="1" strokeDasharray="3 2"/>
      )}
      {/* main shape */}
      <polygon points={poly} fill={accent} fillOpacity="0.14" stroke={accent} strokeWidth="1.5"/>
      {/* data points */}
      {axes.map((k,i)=>{
        const [x,y]=pt(i,s[k]);
        return (
          <g key={i}>
            <circle cx={x} cy={y} r="4" fill={accent} fillOpacity="0.18" />
            <circle cx={x} cy={y} r="2.4" fill={accent}/>
          </g>
        );
      })}
      {/* labels with scores */}
      {labels.map((l,i)=>{
        const [x,y]=pt(i,12.5);
        const k = axes[i];
        return (
          <g key={i}>
            <text x={x} y={y-4} className="kl" fill={T().ink3} fontSize="8"
              textAnchor="middle" dominantBaseline="middle" style={{textTransform:'uppercase',letterSpacing:'0.12em'}}>{l}</text>
            <text x={x} y={y+5} fill={T().ink} fontSize="8.5" fontWeight="600"
              textAnchor="middle" dominantBaseline="middle"
              style={{fontFamily:'"Spline Sans Mono",monospace'}}>{s[k].toFixed(1)}</text>
          </g>
        );
      })}
    </svg>
  );
}

// generic tag chip
function Tag({ children, accent }) {
  return (
    <span className="sans" style={{
      fontSize:11.5, color: accent ? 'var(--spot-2)' : 'var(--ink-2)',
      border:`1px solid ${accent ? 'var(--spot)' : 'var(--line)'}`,
      background: accent ? 'var(--spot-soft)' : 'transparent',
      padding:'3px 9px', borderRadius:999, whiteSpace:'nowrap',
    }}>{children}</span>
  );
}

function setGlobalWeights(w) {
  if (!w) return;
  ['food','value','vibe','service'].forEach(k => { if (typeof w[k] === 'number') AXIS_WEIGHTS[k] = w[k]; });
}

Object.assign(window, {
  Rule, KLabel, CuisineDot, StatusDot, StatusTag, PriceLevel,
  AgainTag, Meter, ScoreGrid, OverallBadge, Radar, Tag,
  scoreTier, calcWeighted, WeightStrip, AXIS_WEIGHTS, AXIS_ORDER, setGlobalWeights,
});

</script>
<script type="text/babel">
// ── inlined from app/store.jsx ──
// store.jsx — Real persistence for The Standing Table working app.
// localStorage-backed place collection + photo compression + JSON backup.
// Loads after ds.jsx / photos.jsx (uses window.PLACES as optional sample seed).
// Exports: window.useCollection, window.compressPhoto, window.dbExport, window.dbImportFile,
//          window.newId, window.fmtDay, window.todayISO

const DB_KEY = 'standingTable.collection.v1';

// ── low-level read/write ──────────────────────────────────────────────────
function dbRead() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed.places) ? parsed : null;
  } catch (e) { return null; }
}

function dbWrite(places) {
  try {
    localStorage.setItem(DB_KEY, JSON.stringify({ v: 1, savedAt: new Date().toISOString(), places }));
    return { ok: true };
  } catch (e) {
    // Most likely quota exceeded (too many photos)
    return { ok: false, error: e && e.name === 'QuotaExceededError'
      ? 'Storage is full — try removing some photos from older entries.'
      : 'Could not save. ' + (e && e.message ? e.message : '') };
  }
}

// ── helpers ───────────────────────────────────────────────────────────────
function newId() {
  return 'p-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
}

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

// '2026-06-10' → 'Jun 10' (matches the editorial date style)
function fmtDay(iso) {
  if (!iso) return null;
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = String(iso).split('-');
  if (parts.length !== 3) return iso; // already display-formatted (sample data)
  return m[parseInt(parts[1], 10) - 1] + ' ' + String(parseInt(parts[2], 10)).padStart(2, '0');
}

// Compress an uploaded photo to a small JPEG data-URL (fits localStorage budget)
function compressPhoto(file, maxDim = 900, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
    img.src = url;
  });
}

// ── sample seed (from the design's demo data) ─────────────────────────────
function samplePlaces() {
  return (window.PLACES || []).map(p => ({
    ...p,
    photos: p.photo ? [p.photo] : [],
    sample: true,
    createdAt: new Date().toISOString(),
  }));
}

// ── backup / restore ──────────────────────────────────────────────────────
function dbExport(places) {
  const blob = new Blob([JSON.stringify({ app: 'The Standing Table', v: 1, exportedAt: new Date().toISOString(), places }, null, 2)],
    { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'standing-table-backup-' + todayISO() + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

function dbImportFile(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        const places = Array.isArray(data) ? data : data.places;
        if (!Array.isArray(places)) throw new Error('No places found in file');
        resolve(places.map(p => ({ photos: [], tags: [], meal: [], occasion: [], ...p })));
      } catch (e) { reject(e); }
    };
    r.onerror = () => reject(new Error('Could not read file'));
    r.readAsText(file);
  });
}

// ── React hook: the whole collection API ──────────────────────────────────
function useCollection() {
  const [db, setDb] = React.useState(() => dbRead()); // null = first run
  const [saveError, setSaveError] = React.useState(null);
  const places = db ? db.places : null;

  const commit = (nextPlaces) => {
    const res = dbWrite(nextPlaces);
    setSaveError(res.ok ? null : res.error);
    setDb({ v: 1, places: nextPlaces });
  };

  return {
    places,            // null until seeded (first run) — show welcome screen
    saveError,
    seedSamples: () => commit(samplePlaces()),
    seedEmpty:   () => commit([]),
    addPlace: (p) => { const full = { id: newId(), createdAt: new Date().toISOString(), ...p }; commit([full, ...(places || [])]); return full.id; },
    updatePlace: (id, patch) => commit(places.map(p => p.id === id ? { ...p, ...patch } : p)),
    deletePlace: (id) => commit(places.filter(p => p.id !== id)),
    replaceAll: (next) => commit(next),
  };
}

Object.assign(window, { useCollection, compressPhoto, dbExport, dbImportFile, newId, fmtDay, todayISO });

</script>
<script type="text/babel">
// ── inlined from app/app-screens.jsx ──
// app-screens.jsx — Working pipeline, detail, welcome + settings screens.
// Depends on ds.jsx, atoms.jsx, store.jsx. Exports: AppPipeline, AppDetail, AppWelcome, AppSettings

// ── card (reads real data: photos[], ISO dates) ───────────────────────────
function AppCard({ p, onTap, selecting, selected }) {
  const reviewed = p.status === 'reviewed';
  const photo = (p.photos && p.photos[0]) || null;
  const hasMeta = p.date || p.again != null || p.byline || (p.status === 'want' && p.tags && p.tags[0]);
  return (
    <button onClick={onTap} style={{
      width: '100%', textAlign: 'left', background: 'var(--card)',
      border: '1px solid ' + (selected ? 'var(--spot)' : 'var(--line)'),
      borderRadius: 14, padding: 0, cursor: 'pointer', display: 'flex', overflow: 'hidden',
      flexShrink: 0, minHeight: 86, boxShadow: '0 1px 0 rgba(28,24,21,0.03)',
    }}>
      {selecting && (
        <div style={{ display: 'flex', alignItems: 'center', paddingLeft: 13 }}>
          <span style={{ width: 20, height: 20, borderRadius: 6, flexShrink: 0, border: '1.5px solid ' + (selected ? 'var(--spot)' : 'var(--line)'), background: selected ? 'var(--spot)' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            {selected ? <span style={{ color: 'var(--paper)', fontSize: 13, lineHeight: 1 }}>✓</span> : null}
          </span>
        </div>
      )}
      <div style={{ flex: 1, padding: '13px 14px', minWidth: 0, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
          <div className="serif" style={{ fontSize: 17, fontWeight: 560, color: 'var(--ink)', lineHeight: 1.15, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{p.name}</div>
          {reviewed && p.overall != null
            ? <div className="num" style={{ fontSize: 21, fontWeight: 600, color: 'var(--spot)', letterSpacing: '-0.02em', flexShrink: 0 }}>{p.overall.toFixed(1)}</div>
            : <span style={{ flexShrink: 0 }}><window.PriceLevel level={p.price} size={12} color="var(--ink-3)" /></span>}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 7, minWidth: 0 }}>
          <window.CuisineDot cuisine={p.cuisine} showLabel />
          {p.hood ? <span style={{ color: 'var(--line)' }}>·</span> : null}
          {p.hood ? <span className="sans" style={{ fontSize: 12.5, color: 'var(--ink-3)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', minWidth: 0 }}>{p.hood}</span> : null}
        </div>
        {hasMeta && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8, flexWrap: 'wrap' }}>
            {p.date && <span className="kl">{p.status === 'want' ? 'Added' : 'Visited'} · {window.fmtDay(p.date)}</span>}
            {p.again != null && <window.AgainTag again={p.again} compact />}
            {p.byline ? <window.KLabel>{p.byline}</window.KLabel> : null}
            {p.status === 'want' && p.tags && p.tags[0] && <window.KLabel>{p.tags[0]}</window.KLabel>}
          </div>
        )}
      </div>
      {photo && (
        <div style={{
          width: 96, flexShrink: 0, alignSelf: 'stretch',
          backgroundImage: 'url(' + photo + ')', backgroundSize: 'cover', backgroundPosition: 'center',
          borderLeft: '1px solid var(--line-2)',
        }} />
      )}
    </button>
  );
}

// ── pipeline ──────────────────────────────────────────────────────────────
const APP_LANES = [
  { key: 'want', label: 'Want to try', accent: 'var(--ink-3)' },
  { key: 'visited', label: 'Visited · needs review', accent: 'var(--ink-2)' },
  { key: 'reviewed', label: 'Reviewed', accent: 'var(--spot)' },
];

function AppPipeline({ places, onOpenPlace, onLog, onSettings, switcher, title, hideLog, onBatchOrganize, onBatchDelete }) {
  const canBatch = !!(onBatchOrganize || onBatchDelete);
  const [selecting, setSelecting] = React.useState(false);
  const [sel, setSel] = React.useState(() => new Set());
  const [confirmDel, setConfirmDel] = React.useState(false);
  const toggleSel = (id) => setSel(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const exitSelect = () => { setSelecting(false); setSel(new Set()); setConfirmDel(false); };
  const [active, setActive] = React.useState(() => {
    const counts = APP_LANES.map(l => places.filter(p => p.status === l.key).length);
    if (counts[2]) return 'reviewed';
    if (counts[1]) return 'visited';
    return 'want';
  });
  const byStatus = (k) => {
    const arr = places.filter(p => p.status === k);
    if (k === 'reviewed') return arr.slice().sort((a, b) => (b.overall || 0) - (a.overall || 0));
    return arr;
  };
  const lane = APP_LANES.find(l => l.key === active);
  const list = byStatus(active);

  return (
    <div className="fl sans" style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)' }}>
      <div style={{ padding: '18px 20px 12px', flexShrink: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <window.KLabel style={{ color: 'var(--spot)' }}>The Standing Table</window.KLabel>
            <div className="serif" style={{ fontSize: 26, fontWeight: 560, color: 'var(--ink)', letterSpacing: '-0.01em', marginTop: 3, lineHeight: 1.05 }}>{title || 'Field Notes'}</div>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button onClick={onSettings} aria-label="Backup and settings" style={{
              background: 'transparent', border: '1px solid var(--line)', borderRadius: 999,
              width: 34, height: 34, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <svg width="14" height="14" viewBox="0 0 14 14">
                <circle cx="7" cy="7" r="2.2" stroke="var(--ink-2)" strokeWidth="1.3" fill="none"></circle>
                <path d="M7 1.2v2M7 10.8v2M1.2 7h2M10.8 7h2M2.9 2.9l1.4 1.4M9.7 9.7l1.4 1.4M11.1 2.9L9.7 4.3M4.3 9.7l-1.4 1.4" stroke="var(--ink-2)" strokeWidth="1.3" strokeLinecap="round"></path>
              </svg>
            </button>
            {!hideLog && (
            <button onClick={onLog} style={{
              background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 999,
              padding: '9px 15px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0,
            }}>
              <span style={{ fontSize: 16, lineHeight: 1 }}>+</span>
              <span className="kl" style={{ color: 'var(--paper)' }}>Log</span>
            </button>
            )}
          </div>
        </div>
      </div>

      {switcher || null}

      <div style={{ display: 'flex', gap: 6, padding: '0 20px 12px', flexShrink: 0 }}>
        {APP_LANES.map(l => {
          const on = active === l.key;
          return (
            <button key={l.key} onClick={() => setActive(l.key)} style={{
              flex: 1, background: on ? 'var(--ink)' : 'transparent',
              border: `1px solid ${on ? 'var(--ink)' : 'var(--line)'}`, borderRadius: 999,
              padding: '7px 4px', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
            }}>
              <span className="kl" style={{ color: on ? 'var(--paper)' : 'var(--ink-2)', fontSize: 9 }}>{l.key}</span>
              <span className="num" style={{ fontSize: 13, fontWeight: 600, color: on ? 'var(--paper)' : 'var(--ink)' }}>{places.filter(p => p.status === l.key).length}</span>
            </button>
          );
        })}
      </div>

      <div style={{ padding: '0 20px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <window.KLabel style={{ color: lane.accent }}>{lane.label}</window.KLabel>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <window.KLabel>{list.length} {list.length === 1 ? 'place' : 'places'}</window.KLabel>
          {canBatch && <button onClick={() => selecting ? exitSelect() : setSelecting(true)} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--spot)', padding: 0 }}>{selecting ? 'Done' : 'Select'}</button>}
        </div>
      </div>
      <window.Rule style={{ marginLeft: 20, marginRight: 20, width: 'auto' }} />

      <div style={{ flex: 1, overflowY: 'auto', padding: '12px 20px 32px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {list.map(p => <AppCard key={p.id} p={p} selecting={selecting} selected={sel.has(p.id)} onTap={() => selecting ? toggleSel(p.id) : onOpenPlace(p.id)} />)}
        {!list.length && (
          <div style={{ textAlign: 'center', padding: '48px 24px' }}>
            <div className="serif" style={{ fontSize: 17, fontStyle: 'italic', color: 'var(--ink-3)' }}>
              {active === 'want' ? 'Nothing on the wishlist yet.' : active === 'visited' ? 'No visits waiting for a review.' : 'No reviews yet.'}
            </div>
            {!hideLog && (
            <button onClick={onLog} className="kl" style={{
              marginTop: 14, background: 'none', border: '1px solid var(--line)', borderRadius: 999,
              padding: '9px 16px', cursor: 'pointer', color: 'var(--ink-2)',
            }}>+ Add a place</button>
            )}
          </div>
        )}
      </div>
      {selecting && (
        <div className="sans" style={{ flexShrink: 0, borderTop: '1px solid var(--line)', background: 'var(--paper)', padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span className="kl" style={{ color: 'var(--ink-2)' }}>{sel.size} selected</span>
          <span style={{ flex: 1 }} />
          {onBatchOrganize && <button disabled={!sel.size} onClick={() => onBatchOrganize([...sel])} className="kl" style={{ background: 'var(--spot-soft)', color: 'var(--spot-2)', border: 'none', borderRadius: 999, padding: '8px 13px', cursor: 'pointer', opacity: sel.size ? 1 : 0.4 }}>Add to…</button>}
          {onBatchDelete && (confirmDel ? (
            <button onClick={() => { onBatchDelete([...sel]); exitSelect(); }} className="kl" style={{ background: 'var(--spot)', color: 'var(--paper)', border: 'none', borderRadius: 999, padding: '8px 13px', cursor: 'pointer' }}>Delete {sel.size} ✓</button>
          ) : (
            <button disabled={!sel.size} onClick={() => setConfirmDel(true)} className="kl" style={{ background: 'transparent', color: 'var(--spot-2)', border: '1px solid var(--line)', borderRadius: 999, padding: '8px 13px', cursor: 'pointer', opacity: sel.size ? 1 : 0.4 }}>Delete</button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── detail ────────────────────────────────────────────────────────────────

  const importRef = React.useRef(null);
  const [msg, setMsg] = React.useState(null);

  const pickImport = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try {
      const imported = await window.dbImportFile(f);
      onImport(imported);
      setMsg('Imported ' + imported.length + ' places — your collection was replaced.');
    } catch (err) {
      setMsg('Import failed: ' + err.message);
    }
    e.target.value = '';
  };

  const row = {
    width: '100%', textAlign: 'left', background: 'var(--card)', border: '1px solid var(--line)',

      <div style={{ flex: 1, overflowY: 'auto', padding: '18px 20px 32px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        <p className="serif" style={{ fontSize: 14.5, fontStyle: 'italic', color: 'var(--ink-2)', lineHeight: 1.55, margin: '0 0 8px', textWrap: 'pretty' }}>
          Your collection lives in this browser, on this device. Export a backup file regularly — and use it to move your collection to a new phone, or share it with a friend.
        </p>

        <button onClick={() => window.dbExport(places)} style={row}>
          <span className="kl" style={{ color: 'var(--ink)' }}>Export backup</span>
          <span className="sans" style={{ fontSize: 12.5, color: 'var(--ink-3)' }}>Downloads a JSON file of all {places.length} places, photos included.</span>
        </button>

        <button onClick={() => importRef.current && importRef.current.click()} style={row}>
          <span className="kl" style={{ color: 'var(--ink)' }}>Import backup</span>
          <span className="sans" style={{ fontSize: 12.5, color: 'var(--ink-3)' }}>Replaces this collection with one from a backup file.</span>
        </button>
        <input ref={importRef} type="file" accept="application/json,.json" onChange={pickImport} style={{ display: 'none' }} />

        <button onClick={() => { onLoadSamples(); setMsg('Sample collection loaded.'); }} style={row}>

        <window.KLabel style={{ marginTop: 6 }}>About</window.KLabel>

        </p>
      </div>
    </div>
  );
}

<script type="text/babel">
// ── inlined from app/app-form.jsx ──
// app-form.jsx — Working add / edit / review form. Depends on ds.jsx, atoms.jsx, store.jsx.
// Exports: window.AppForm

const AF_MEALS = ['Breakfast', 'Lunch', 'Dinner'];
const AF_OCCASIONS = ['Date', 'Group', 'Quick bite', 'Solo'];

// ── small form atoms ──────────────────────────────────────────────────────
function AFField({ label, children, style }) {
  return (
    <div style={{ marginTop: 16, ...style }}>
      <window.KLabel>{label}</window.KLabel>
      <div style={{ marginTop: 7 }}>{children}</div>
    </div>

}

const afInputStyle = {
  width: '100%', border: '1px solid var(--line)', borderRadius: 12, padding: '11px 13px',
  background: 'var(--card)', color: 'var(--ink)', fontSize: 15, outline: 'none',
  fontFamily: '"Hanken Grotesk",system-ui,sans-serif',
};

function AFInput(props) {
  return <input {...props} style={{ ...afInputStyle, ...props.style }} />;
}

function AFChips({ options, value, onChange }) {
  return (
    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
      {options.map(o => {
        const on = value === o;
        return (
          <button key={o} type="button" onClick={() => onChange(on ? null : o)} className="sans" style={{
            fontSize: 12.5, padding: '7px 13px', borderRadius: 999, cursor: 'pointer',
            border: `1px solid ${on ? 'var(--ink)' : 'var(--line)'}`,
            background: on ? 'var(--ink)' : 'transparent',
            color: on ? 'var(--paper)' : 'var(--ink-2)', fontWeight: on ? 500 : 400,
          }}>{o}</button>
        );
      })}
    </div>
  );
}

function AFAxisSlider({ label, value, onChange, weight }) {
  const tier = window.scoreTier(value);
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 7 }}>
        <span style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
          <span className="sans" style={{ fontSize: 14, fontWeight: 500, color: 'var(--ink)' }}>{label}</span>
          <span className="num" style={{ fontSize: 9.5, color: 'var(--ink-3)' }}>{weight}% wt</span>

        </span>

      <div style={{ display: 'flex', gap: 3 }}>
        {Array.from({ length: 10 }).map((_, i) => {
          const v = i + 1; const on = v <= Math.round(value);
          return (
            <button key={i} type="button" onClick={() => onChange(v)} style={{
              flex: 1, height: on ? 30 : 24, borderRadius: 6, cursor: 'pointer', border: 'none',
              background: on ? 'var(--spot)' : 'var(--line-2)',
              opacity: on ? (0.5 + (v / 10) * 0.5) : 1,
              transition: 'height 0.15s ease, opacity 0.15s ease', alignSelf: 'flex-end',
              minWidth: 0, padding: 0,
            }} />
          );
        })}
      </div>
    </div>

}

// ── photo strip with real upload ──────────────────────────────────────────
function AFPhotos({ photos, onChange }) {
  const fileRef = React.useRef(null);
  const [busy, setBusy] = React.useState(false);

  const pick = async (e) => {
    const files = Array.from(e.target.files || []).slice(0, 3 - photos.length);
    if (!files.length) return;
    setBusy(true);
    try {
      const added = [];
      for (const f of files) added.push(await window.compressPhoto(f));
      onChange([...photos, ...added].slice(0, 3));
    } catch (err) { /* unreadable file — ignore */ }
    setBusy(false);
    e.target.value = '';
  };

  return (
    <div style={{ display: 'flex', gap: 9, flexWrap: 'wrap' }}>
      {photos.map((src, i) => (
        <div key={i} style={{ position: 'relative', width: 72, height: 72 }}>
          <div onClick={() => window.openPhoto(src)} style={{
            cursor: 'zoom-in', width: 72, height: 72, borderRadius: 12, overflow: 'hidden',
            backgroundImage: `url(${src})`, backgroundSize: 'cover', backgroundPosition: 'center',
            border: '1px solid var(--line)',
          }}></div>
          <button type="button" onClick={() => onChange(photos.filter((_, j) => j !== i))} aria-label="Remove photo" style={{
            position: 'absolute', top: -6, right: -6, width: 20, height: 20, borderRadius: '50%',
            background: 'var(--ink)', color: 'var(--paper)', border: 'none', cursor: 'pointer',
            fontSize: 11, lineHeight: '20px', padding: 0,
          }}>×</button>
        </div>
      ))}
      {photos.length < 3 && (
        <button type="button" onClick={() => fileRef.current && fileRef.current.click()} disabled={busy} style={{
          width: 72, height: 72, borderRadius: 12, flexShrink: 0,
          border: '1.5px dashed var(--line)', background: 'transparent',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          gap: 3, cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 18 18">
            <rect x="2" y="4" width="14" height="10" rx="2" stroke="var(--ink-3)" strokeWidth="1.2" fill="none"></rect>
            <circle cx="7" cy="8.5" r="1.5" stroke="var(--ink-3)" strokeWidth="1" fill="none"></circle>
            <path d="M3 13l4-3.5 3 2 3-3 3 3" stroke="var(--ink-3)" strokeWidth="1" fill="none" strokeLinejoin="round"></path>
          </svg>
          <span className="kl" style={{ fontSize: 8 }}>{busy ? '…' : 'Add'}</span>
        </button>
      )}
      <input ref={fileRef} type="file" accept="image/*" multiple onChange={pick} style={{ display: 'none' }} />
    </div>
  );
}

// ── the form ──────────────────────────────────────────────────────────────
// place: existing place to edit, or null for new. forceStatus: open straight into review mode.
function AppForm({ place, forceStatus, prefill, onSave, onCancel }) {
  const cuisines = Object.keys(window.CUISINE_META);
  const [d, setD] = React.useState(() => ({
    name: '', address: '', cuisine: 'Italian', hood: '', price: 2,
    status: 'want', date: null, meal: ['Dinner'], occasion: [],
    tags: [], dish: '', note: '', photos: [],
    s: { food: 8, value: 7, vibe: 8, service: 7 }, again: true, overall: null,
    spent: null, people: null, weights: null,
    ...(prefill || {}),
    ...(place || {}),
    ...(forceStatus ? { status: forceStatus } : {}),
  }));
  const [tagText, setTagText] = React.useState((place && place.tags || []).join(', '));
  const [err, setErr] = React.useState(null);
  const set = (patch) => setD(prev => ({ ...prev, ...patch }));

  const reviewed = d.status === 'reviewed';
  const dated = d.status !== 'want';
  const scores = d.s || { food: 8, value: 7, vibe: 8, service: 7 };
  const effWeights = d.weights || window.AXIS_WEIGHTS;
  const effTot = (effWeights.food||0)+(effWeights.value||0)+(effWeights.vibe||0)+(effWeights.service||0) || 1;
  const overall = window.calcWeighted(scores, effWeights);

  React.useEffect(() => {
    if (dated && !d.date) set({ date: window.todayISO() });
  }, [d.status]);

  const save = () => {
    if (!d.name.trim()) { setErr('Give the place a name.'); return; }
    const tags = tagText.split(',').map(t => t.trim()).filter(Boolean);
    onSave({
      ...d,
      name: d.name.trim(), hood: d.hood.trim(), tags,
      meal: d.meal && d.meal.length ? d.meal : [],
      occasion: d.occasion && d.occasion.length ? d.occasion : [],
      s: reviewed ? scores : null,
      overall: reviewed ? Math.round(overall * 10) / 10 : null,
      again: reviewed ? d.again : null,
      date: dated ? d.date : null,
    });
  };

  return (
    <div className="fl sans" style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)' }}>
      {/* top bar */}
      <div style={{ padding: '14px 20px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
        <button onClick={onCancel} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', padding: '6px 0' }}>Cancel</button>
        <window.KLabel>{place ? (forceStatus === 'reviewed' && place.status !== 'reviewed' ? 'Review Visit' : 'Edit Entry') : 'New Entry'}</window.KLabel>
        <button onClick={save} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--spot)', fontWeight: 600, padding: '6px 0' }}>Save</button>
      </div>
      <window.Rule style={{ marginLeft: 20, marginRight: 20, width: 'auto' }} />

      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 20px 40px' }}>
        {err && (
          <div className="sans" style={{ marginTop: 14, padding: '10px 13px', borderRadius: 10, background: 'var(--spot-soft)', color: 'var(--spot-2)', fontSize: 13 }}>{err}</div>
        )}

        <AFField label="Place name">
          <AFInput value={d.name} onChange={e => set({ name: e.target.value })} placeholder="e.g. Maya Oaxaca"
            className="serif" style={{ fontSize: 19, fontFamily: '"Cormorant Garamond",Georgia,serif', fontWeight: 500 }} />
        </AFField>

        <div style={{ display: 'flex', gap: 10 }}>

<script type="text/babel">
// ── inlined from phase6-src/store-cloud.jsx ──
// store-cloud.jsx — Supabase-backed collection layer (Phase 4).
// Loads after store.jsx (which still provides compressPhoto, dbExport, dbImportFile, fmtDay, todayISO).
// Exports: window.sb, window.useCloudCollection, window.cloudSamplePlaces

const SUPA_URL = 'https://wgtvajhtqubcujqzqkyc.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndndHZhamh0cXViY3VqcXpxa3ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDI2MDEsImV4cCI6MjA5NjY3ODYwMX0.NDZvae4SlsoXmKUTwTDEebqHlbQSdLHvY6cks7nsJ40';

const sb = window.supabase.createClient(SUPA_URL, SUPA_ANON);

// ── shape mapping: DB row ↔ app place ─────────────────────────────────────
function cloudIsISODate(d) { return typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d); }

function rowToPlace(r) {
  return {
    id: r.id, name: r.name, cuisine: r.cuisine || 'Italian', hood: r.hood || '', address: r.address || '',
    status: r.status, price: r.price || 2, date: r.date,
    meal: r.meal || [], occasion: r.occasion || [], tags: r.tags || [],
    dish: r.dish || '', note: r.note || '',
    s: r.s || null, overall: r.overall == null ? null : Number(r.overall), again: r.again,
    lat: r.lat == null ? null : Number(r.lat), lng: r.lng == null ? null : Number(r.lng),
    spent: r.spent == null ? null : Number(r.spent), people: r.people == null ? null : Number(r.people),
    weights: r.weights || null,
    photos: r.photos || [], createdAt: r.created_at,
  };
}

function placeToRow(p, uid) {
  return {
    owner: uid,
    name: p.name || 'Untitled', cuisine: p.cuisine || null, hood: p.hood || null, address: p.address || null,
    status: p.status || 'want', price: p.price || null,
    date: cloudIsISODate(p.date) ? p.date : null,
    meal: p.meal || [], occasion: p.occasion || [], tags: p.tags || [],
    dish: p.dish || null, note: p.note || null,
    s: p.s || null, overall: p.overall == null ? null : p.overall, again: p.again == null ? null : p.again,
    lat: p.lat == null ? null : p.lat, lng: p.lng == null ? null : p.lng,
    spent: p.spent == null ? null : p.spent, people: p.people == null ? null : p.people,
    weights: p.weights || null,
    photos: p.photos || [],
  };
}

// ── photo upload: data-URLs → storage bucket public URLs ──────────────────
async function cloudUploadPhotos(uid, photos) {
  const out = [];
  for (const ph of (photos || [])) {
    if (typeof ph !== 'string') continue;
    if (!ph.startsWith('data:')) { out.push(ph); continue; }
    const blob = await (await fetch(ph)).blob();
    const path = uid + '/' + crypto.randomUUID() + '.jpg';
    const { error } = await sb.storage.from('photos').upload(path, blob, { contentType: 'image/jpeg' });
    if (error) throw error;
    out.push(SUPA_URL + '/storage/v1/object/public/photos/' + path);
  }
  return out;
}

function cloudPhotoPath(url) {
  const parts = String(url).split('/object/public/photos/');
  return parts.length === 2 ? decodeURIComponent(parts[1]) : null;
}

// sample collection adapted for the cloud schema (demo dates dropped)
function cloudSamplePlaces() {
  return (window.PLACES || []).map(p => ({ ...p, date: null, photos: p.photo ? [p.photo] : [] }));
}

// ── the hook ──────────────────────────────────────────────────────────────
function useCloudCollection(user) {
  const [places, setPlaces] = React.useState(null);   // null = loading
  const [saveError, setSaveError] = React.useState(null);

  const fail = (what, e) => setSaveError(what + ' — ' + (e && e.message ? e.message : 'unknown error'));

  const refetch = React.useCallback(async () => {
    try {
      const { data, error } = await Promise.race([
        sb.from('places').select('*').eq('owner', user.id).order('created_at', { ascending: false }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('request timed out — check your connection, then retry')), 10000)),
      ]);
      if (error) throw error;
      setSaveError(null);
      setPlaces(data.map(rowToPlace));
    } catch (e) { fail('Could not load your places', e); }
  }, []);

  React.useEffect(() => { setTimeout(() => refetch(), 0); }, [user.id]);

  const addPlace = (data) => {
    const id = crypto.randomUUID();
    const local = { id, createdAt: new Date().toISOString(), ...data };
    setPlaces(prev => [local, ...(prev || [])]);
    (async () => {
      try {
        const photos = await cloudUploadPhotos(user.id, data.photos);
        const row = placeToRow({ ...data, photos }, user.id);
        row.id = id;
        const { error } = await sb.from('places').insert(row);
        if (error) throw error;
        setPlaces(prev => prev.map(p => p.id === id ? { ...p, photos } : p));
      } catch (e) { fail('Could not save to your account', e); }
    })();
    return id;
  };

  const updatePlace = (id, patch) => {
    const current = (places || []).find(p => p.id === id);
    if (!current) return;
    const merged = { ...current, ...patch };
    setPlaces(prev => prev.map(p => p.id === id ? merged : p));
    (async () => {
      try {
        const photos = await cloudUploadPhotos(user.id, merged.photos);
        const { error } = await sb.from('places').update(placeToRow({ ...merged, photos }, user.id)).eq('id', id);
        if (error) throw error;
        setPlaces(prev => prev.map(p => p.id === id ? { ...p, photos } : p));
      } catch (e) { fail('Could not save changes', e); }
    })();
  };

  const deletePlace = (id) => {
    const victim = (places || []).find(p => p.id === id);
    setPlaces(prev => prev.filter(p => p.id !== id));
    (async () => {
      try {
        const { error } = await sb.from('places').delete().eq('id', id);
        if (error) throw error;
        const paths = ((victim && victim.photos) || []).map(cloudPhotoPath).filter(Boolean);
        if (paths.length) sb.storage.from('photos').remove(paths);
      } catch (e) { fail('Could not delete', e); }
    })();
  };

  // Import ADDS places to the account (it never wipes anything)
  const importPlaces = async (arr) => {
    const rows = [];
    for (const p of arr) {
      const photos = await cloudUploadPhotos(user.id, p.photos || (p.photo ? [p.photo] : []));
      rows.push(placeToRow({ ...p, photos }, user.id));
    }
    const { error } = await sb.from('places').insert(rows);
    if (error) throw error;
    await refetch();
    return rows.length;
  };

  return { places, saveError, addPlace, updatePlace, deletePlace, importPlaces, refetch };
}

Object.assign(window, { sb, useCloudCollection, cloudSamplePlaces, cloudUploadPhotos, cloudRowToPlace: rowToPlace });


</script>
<script type="text/babel">
// ── inlined from phase6-src/screens-cloud.jsx ──
// screens-cloud.jsx — Sign-in, loading, account settings + guide sharing (Phase 6 fork).

function CloudError({ message, onRetry, onSignOut }) {

        }}>Sign out</button>
      </div>

}

function CloudSignIn() {
  const [email, setEmail] = React.useState('');
  const [state, setState] = React.useState('idle'); // idle | busy | sent | error
  const [error, setError] = React.useState(null);

  const send = async () => {
    const addr = email.trim();
    if (!addr || !addr.includes('@')) { setError('Enter a valid email address.'); setState('error'); return; }
    setState('busy');
    const { error: err } = await window.sb.auth.signInWithOtp({
      email: addr,
      options: { emailRedirectTo: window.location.origin + window.location.pathname },
    });
    if (err) { setError(err.message); setState('error'); }
    else setState('sent');
  };

  return (
    <div className="fl sans" style={{
      height: '100%', background: 'var(--paper)', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', padding: '0 32px', textAlign: 'center',
    }}>
      <window.KLabel style={{ color: 'var(--spot)' }}>The Standing Table</window.KLabel>
      <div className="serif" style={{ fontSize: 34, fontWeight: 580, color: 'var(--ink)', letterSpacing: '-0.015em', lineHeight: 1.05, marginTop: 8 }}>

      {state !== 'sent' ? (
        <React.Fragment>
          <p className="serif" style={{ fontSize: 15.5, fontStyle: 'italic', color: 'var(--ink-2)', lineHeight: 1.55, maxWidth: 300, marginTop: 14, textWrap: 'pretty' }}>
            Your email gets a sign-in link — no password to remember. Your places follow you to any device.
          </p>

            <input
              type="email" value={email} autoComplete="email" inputMode="email"
              onChange={e => { setEmail(e.target.value); if (state === 'error') setState('idle'); }}
              onKeyDown={e => { if (e.key === 'Enter') send(); }}
              placeholder="you@example.com"
              style={{
                width: '100%', boxSizing: 'border-box', border: '1px solid var(--line)', borderRadius: 12,
                padding: '13px 14px', background: 'var(--card)', color: 'var(--ink)', fontSize: 15,
                outline: 'none', textAlign: 'center', fontFamily: '"Hanken Grotesk",system-ui,sans-serif',
              }} />
            <button onClick={send} disabled={state === 'busy'} className="kl" style={{
              background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 12,
              padding: '14px 0', cursor: 'pointer', opacity: state === 'busy' ? 0.6 : 1,
            }}>{state === 'busy' ? 'Sending…' : 'Email me a sign-in link'}</button>
          </div>

          <p className="serif" style={{ fontSize: 15.5, fontStyle: 'italic', color: 'var(--ink-2)', lineHeight: 1.55, maxWidth: 300, marginTop: 14, textWrap: 'pretty' }}>

          </p>
          <p className="sans" style={{ fontSize: 12.5, color: 'var(--ink-3)', lineHeight: 1.6, maxWidth: 280, marginTop: 10 }}>
            Open it on this device. Check spam if it hasn't arrived in a minute.
          </p>
          <button onClick={() => setState('idle')} className="kl" style={{
            marginTop: 20, background: 'none', border: '1px solid var(--line)', borderRadius: 999,
            padding: '9px 16px', cursor: 'pointer', color: 'var(--ink-2)',
          }}>Use a different email</button>
        </React.Fragment>
      )}

  );

// ── Phase 6 · read-only sharing: your public guide ────────────────────────
function GuideShareCard({ profile, onSaveProfile }) {
  const [name, setName] = React.useState(profile ? profile.name : '');
  const [handle, setHandle] = React.useState(profile ? (profile.handle || '') : '');
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const [copied, setCopied] = React.useState(false);

  React.useEffect(() => {
    if (profile) { setName(profile.name); setHandle(profile.handle || ''); }
  }, [profile && profile.id]);

  const card = {
    background: 'var(--card)', border: '1px solid var(--line)', borderRadius: 12,
    padding: '13px 15px', display: 'flex', flexDirection: 'column', gap: 10,
  };

  if (!profile) {
    return (
      <div style={card}>
        <span className="kl" style={{ color: 'var(--ink-3)' }}>My public guide</span>
        <span className="serif" style={{ fontSize: 13.5, fontStyle: 'italic', color: 'var(--ink-3)' }}>Loading sharing settings…</span>
      </div>
    );
  }

  const dirty = name.trim() !== profile.name || handle.trim() !== (profile.handle || '');
  const link = window.location.origin + window.location.pathname + '?guide=' + (profile.handle || '');

  const run = async (fn, okMsg) => {
    setBusy(true); setMsg(null);
    try { await fn(); if (okMsg) setMsg(okMsg); }
    catch (e) { setMsg((e && e.message) || 'Something went wrong.'); }
    setBusy(false);
  };

  const inputStyle = {
    width: '100%', boxSizing: 'border-box', border: '1px solid var(--line)', borderRadius: 10,
    padding: '10px 12px', background: 'var(--paper)', color: 'var(--ink)', fontSize: 14,
    outline: 'none', fontFamily: '"Hanken Grotesk",system-ui,sans-serif',
  };

  const copy = () => {
    (navigator.clipboard ? navigator.clipboard.writeText(link) : Promise.reject()).then(
      () => { setCopied(true); setTimeout(() => setCopied(false), 1600); },

function GlobalWeightsCard({ profile, onSaveProfile }) {

<script type="text/babel">
// ── inlined from phase6-src/places-live.jsx ──
// places-live.jsx — REAL Google Places search for the Add Place flow (Phase 5).
// Uses Places API (New) REST endpoints with window.GMAPS_KEY.
// Exports: window.LiveSearch

// ── Google type → editorial cuisine mapping ───────────────────────────────
const G_CUISINE_MAP = [
  ['french_restaurant', 'French'],
  ['italian_restaurant', 'Italian'], ['pizza_restaurant', 'Italian'],
  ['korean_restaurant', 'Korean'], ['barbecue_restaurant', 'Korean'],
  ['japanese_restaurant', 'Japanese'], ['sushi_restaurant', 'Japanese'], ['ramen_restaurant', 'Japanese'],
  ['mexican_restaurant', 'Mexican'],
  ['indian_restaurant', 'Indian'],
  ['bakery', 'Bakery'], ['bagel_shop', 'Bakery'], ['dessert_shop', 'Bakery'],
  ['vegetarian_restaurant', 'Vegetarian'], ['vegan_restaurant', 'Vegetarian'],
  ['wine_bar', 'Cocktail Bar'], ['bar', 'Cocktail Bar'],
  ['pub', 'Gastropub'], ['american_restaurant', 'Gastropub'], ['hamburger_restaurant', 'Gastropub'],
  ['cafe', 'Coffee'], ['coffee_shop', 'Coffee'],
  ['thai_restaurant', 'Thai'],
];

function gCuisineFromTypes(types) {
  for (const [t, c] of G_CUISINE_MAP) if ((types || []).includes(t)) return c;
  return 'Italian'; // form default — user can change it
}

const G_PRICE_MAP = {
  PRICE_LEVEL_INEXPENSIVE: 1, PRICE_LEVEL_MODERATE: 2,
  PRICE_LEVEL_EXPENSIVE: 3, PRICE_LEVEL_VERY_EXPENSIVE: 4,
};

// ── API calls ─────────────────────────────────────────────────────────────
async function gAutocomplete(input) {
  const res = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': window.GMAPS_KEY },
    body: JSON.stringify({ input, includedPrimaryTypes: ['restaurant', 'cafe', 'bar', 'bakery', 'meal_takeaway'] }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error((body.error && body.error.message) || ('Search failed (' + res.status + ')'));
  }
  const data = await res.json();
  return (data.suggestions || [])
    .map(s => s.placePrediction).filter(Boolean)
    .map(p => ({
      placeId: p.placeId,
      name: (p.structuredFormat && p.structuredFormat.mainText && p.structuredFormat.mainText.text) || (p.text && p.text.text) || '',
      address: (p.structuredFormat && p.structuredFormat.secondaryText && p.structuredFormat.secondaryText.text) || '',
    }));
}

async function gPhotoDataUrl(photoName) {
  const url = 'https://places.googleapis.com/v1/' + photoName + '/media?maxWidthPx=900&key=' + window.GMAPS_KEY;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('photo fetch failed');
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(blob);
    });
  } catch (e) {
    return url; // hotlink fallback — works in <img>, just not uploaded to your storage
  }
}

async function gDetails(placeId) {
  const res = await fetch('https://places.googleapis.com/v1/places/' + placeId, {
    headers: {
      'X-Goog-Api-Key': window.GMAPS_KEY,
      'X-Goog-FieldMask': 'id,displayName,formattedAddress,addressComponents,types,priceLevel,photos,location',
    },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error((body.error && body.error.message) || ('Could not load place (' + res.status + ')'));
  }
  const d = await res.json();

  const comp = (type) => {
    const c = (d.addressComponents || []).find(c => (c.types || []).includes(type));
    return c ? (c.longText || c.shortText) : null;
  };
  const streetNum = comp('street_number'), route = comp('route');
  const address = (streetNum && route) ? (streetNum + ' ' + route)
    : (d.formattedAddress ? d.formattedAddress.split(',')[0] : '');
  const hood = comp('neighborhood') || comp('sublocality_level_1') || comp('sublocality') || comp('locality') || '';

  const prefill = {
    name: (d.displayName && d.displayName.text) || '',
    address, hood,
    cuisine: gCuisineFromTypes(d.types),
    price: G_PRICE_MAP[d.priceLevel] || 2,
    lat: (d.location && d.location.latitude != null) ? d.location.latitude : null,
    lng: (d.location && d.location.longitude != null) ? d.location.longitude : null,
    photos: [],
  };
  if (d.photos && d.photos[0] && d.photos[0].name) {
    prefill.photos = [await gPhotoDataUrl(d.photos[0].name)];
  }
  return prefill;
}

// ── Google pin (from the design) ──────────────────────────────────────────
function GLivePin({ size = 16 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" style={{ flexShrink: 0 }}>
      <path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6c0 3.5 4.5 8 4.5 8s4.5-4.5 4.5-8c0-2.5-2-4.5-4.5-4.5z" fill="#EA4335"></path>
      <circle cx="8" cy="6" r="1.8" fill="white"></circle>
    </svg>
  );
}

// ── Full-screen live search ───────────────────────────────────────────────
function LiveSearch({ onPick, onManual, onClose }) {
  const [query, setQuery] = React.useState('');
  const [results, setResults] = React.useState([]);
  const [state, setState] = React.useState('idle'); // idle | searching | picking | error
  const [error, setError] = React.useState(null);
  const timer = React.useRef(null);
  const seq = React.useRef(0);

  const search = (q) => {
    setQuery(q);
    if (timer.current) clearTimeout(timer.current);
    if (q.trim().length < 3) { setResults([]); setState('idle'); return; }
    timer.current = setTimeout(async () => {
      const mySeq = ++seq.current;
      setState('searching');
      try {
        const r = await gAutocomplete(q.trim());
        if (seq.current !== mySeq) return; // stale response
        setResults(r.slice(0, 5));
        setState('idle');
      } catch (e) {
        if (seq.current !== mySeq) return;
        setError(e.message); setState('error');
      }
    }, 300);
  };

  const pick = async (r) => {
    setState('picking');
    try {
      const prefill = await gDetails(r.placeId);
      onPick(prefill);
    } catch (e) {
      // details failed — still useful: pass what autocomplete knew
      onPick({ name: r.name, address: r.address.split(',')[0] || '', hood: '', photos: [] });
    }
  };

  return (
    <div className="fl sans" style={{
      width: '100%', height: '100%', background: 'var(--paper)',
      display: 'flex', flexDirection: 'column', overflow: 'hidden',
    }}>
      <div style={{ padding: '14px 20px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
        <button onClick={onClose} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', padding: '6px 0' }}>Cancel</button>
        <window.KLabel>Add a Place</window.KLabel>
        <div style={{ width: 44 }}></div>
      </div>
      <window.Rule style={{ marginLeft: 20, marginRight: 20, width: 'auto' }} />

      <div style={{ padding: '14px 20px 0', flexShrink: 0 }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          background: 'var(--card)', border: '1.5px solid var(--line)',
          borderRadius: 14, padding: '11px 13px',
          boxShadow: '0 2px 8px rgba(28,24,21,0.05)',
        }}>
          <GLivePin size={17} />
          <input value={query} onChange={e => search(e.target.value)} autoFocus
            placeholder="Search Google Maps…"
            style={{
              flex: 1, border: 'none', background: 'none', outline: 'none', minWidth: 0,
              fontFamily: '"Hanken Grotesk",sans-serif', fontSize: 15, color: 'var(--ink)',
            }} />
          {query ? (
            <button onClick={() => search('')} aria-label="Clear" style={{
              background: 'var(--paper-2)', border: 'none', cursor: 'pointer',
              width: 22, height: 22, borderRadius: '50%', display: 'flex',
              alignItems: 'center', justifyContent: 'center', flexShrink: 0,
            }}>
              <span style={{ fontSize: 13, color: 'var(--ink-3)', lineHeight: 1 }}>×</span>
            </button>
          ) : null}
        </div>
      </div>

      {state === 'picking' && (
        <div style={{ padding: '24px 20px', textAlign: 'center' }}>
          <span className="serif" style={{ fontSize: 15, fontStyle: 'italic', color: 'var(--ink-3)' }}>Pulling the details from Google…</span>
        </div>
      )}

      {state === 'error' && (
        <div className="sans" style={{ margin: '12px 20px 0', padding: '11px 14px', borderRadius: 10, background: 'var(--spot-soft)', color: 'var(--spot-2)', fontSize: 13, lineHeight: 1.5 }}>
          {error}
        </div>
      )}

      {state !== 'picking' && results.length > 0 && (
        <div style={{
          margin: '10px 20px 0', background: 'var(--card)',
          border: '1px solid var(--line)', borderRadius: 14, overflow: 'hidden',
          boxShadow: '0 6px 24px rgba(28,24,21,0.09)',
        }}>
          {results.map((r, i) => (
            <button key={r.placeId} onClick={() => pick(r)} style={{
              width: '100%', display: 'flex', alignItems: 'center', gap: 11,
              padding: '12px 14px', background: 'none', border: 'none',
              cursor: 'pointer', textAlign: 'left',
              borderBottom: i === results.length - 1 ? 'none' : '1px solid var(--line-2)',
            }}>
              <div style={{
                width: 34, height: 34, borderRadius: 9, background: '#F1F3F4',
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
              }}>
                <GLivePin size={15} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="sans" style={{ fontSize: 14, fontWeight: 500, color: 'var(--ink)', lineHeight: 1.2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name}</div>
                <div className="sans" style={{ fontSize: 11.5, color: 'var(--ink-3)', marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.address}</div>
              </div>
            </button>
          ))}
          <div style={{
            padding: '9px 14px', borderTop: '1px solid var(--line-2)',
            display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 5,
          }}>
            <span className="kl" style={{ fontSize: 8, color: 'var(--ink-3)', letterSpacing: '0.1em' }}>Powered by</span>
            <span className="sans" style={{ fontSize: 10.5, fontWeight: 600, color: 'var(--ink-2)' }}>Google</span>
          </div>
        </div>
      )}

      {state === 'idle' && results.length === 0 && query.trim().length < 3 && (
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 40 }}>
          <div style={{ textAlign: 'center', maxWidth: 220 }}>
            <div style={{
              margin: '0 auto 14px', width: 48, height: 48, borderRadius: 14, background: '#F1F3F4',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <GLivePin size={22} />
            </div>
            <p className="sans" style={{ fontSize: 13.5, color: 'var(--ink-3)', lineHeight: 1.55, textWrap: 'pretty' }}>
              Search for a restaurant, bar, or café. The details fill themselves in from Google Maps.
            </p>
          </div>
        </div>
      )}

      <div style={{ padding: '0 20px 22px', marginTop: 'auto', flexShrink: 0 }}>
        <button onClick={onManual} className="kl" style={{
          width: '100%', background: 'none', border: '1px solid var(--line)', borderRadius: 12,
          padding: '12px 0', cursor: 'pointer', color: 'var(--ink-2)',
        }}>Skip — enter it manually</button>
      </div>
    </div>
  );
}

Object.assign(window, { LiveSearch });

</script>
<script type="text/babel">
// ── inlined from phase6-src/store-social.jsx ──
// store-social.jsx — profiles, public guides, shared tables (Phase 6).
// Loads after store-cloud.jsx. Exports: window.socialApi, window.useSharedTable

const social = {

  // ── profiles ────────────────────────────────────────────────────────────
  async ensureProfile(user) {
    const { data, error } = await window.sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    if (error) throw error;
    if (data) return data;
    const base = (user.email || 'someone').split('@')[0].toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-+|-+$)/g, '').slice(0, 18) || 'table';
    const row = {
      id: user.id,
      name: (user.email || 'Someone').split('@')[0],
      handle: base + '-' + Math.random().toString(36).slice(2, 6),
      guide_public: false,
    };
    const { error: e2 } = await window.sb.from('profiles').insert(row);
    if (e2) throw e2;
    return row;
  },

  async saveProfile(userId, patch) {
    const { data, error } = await window.sb.from('profiles').update(patch).eq('id', userId).select().single();
    if (error) {
      if (String(error.code) === '23505') throw new Error('That handle is taken — try another.');
      if (String(error.code) === '23514') throw new Error('Handles: 3–24 characters, lowercase letters, numbers, dashes.');
      throw error;
    }
    return data;
  },

  // ── public guide (no sign-in required) ─────────────────────────────────
  async fetchGuide(handle) {
    const { data: prof, error } = await window.sb.from('profiles')
      .select('*').eq('handle', handle).eq('guide_public', true).maybeSingle();
    if (error) throw error;
    if (!prof) throw new Error('This guide is private or does not exist.');
    const { data: rows, error: e2 } = await window.sb.from('places')
      .select('*').eq('owner', prof.id).eq('status', 'reviewed')
      .order('overall', { ascending: false });
    if (e2) throw e2;
    const places = (rows || []).map(window.cloudRowToPlace);

    // personal lists are public-readable when the guide is published (Phase 7G)
    let lists = [];
    try {
      const lQ = await window.sb.from('personal_lists')
        .select('id,name,created_at,personal_list_places(place_id)')
        .eq('owner', prof.id).order('created_at');
      if (!lQ.error) {
        const byId = {}; places.forEach(p => { byId[p.id] = p; });
        lists = (lQ.data || []).map(l => ({
          id: l.id, name: l.name,
          places: (l.personal_list_places || []).map(x => byId[x.place_id]).filter(Boolean),
        })).filter(l => l.places.length);
      }
    } catch (e) { /* lists are optional */ }

    return { profile: prof, places, lists };
  },

  // ── tables registry ─────────────────────────────────────────────────────
  async fetchTables() {
    const { data, error } = await window.sb.from('shared_tables').select('*').order('created_at');
    if (error) throw error;
    return data;
  },

  async createTable(name) {
    const { data, error } = await window.sb.from('shared_tables').insert({ name }).select().single();
    if (error) throw error;
    return data;
  },

  async joinTable(code) {
    const { data, error } = await window.sb.rpc('join_table_by_code', { p_code: code });
    if (error) throw error;
    if (data && data.error) throw new Error(data.error);
    return data;
  },

  async leaveTable(tableId, userId) {
    const { error } = await window.sb.from('shared_table_members')
      .delete().eq('table_id', tableId).eq('user_id', userId);
    if (error) throw error;
  },

  async deleteTable(id) {
    const { error } = await window.sb.from('shared_tables').delete().eq('id', id);
    if (error) throw error;
  },

  // ── personal lists (Phase 7E) ─────────────────────────────────────────
  async fetchLists() {
    const { data, error } = await window.sb
      .from('personal_lists')
      .select('id,name,created_at,personal_list_places(place_id)')
      .order('created_at');
    if (error) throw error;
    return (data || []).map(l => ({
      id: l.id, name: l.name, created_at: l.created_at,
      placeIds: (l.personal_list_places || []).map(x => x.place_id),
    }));
  },
  async createList(name) {
    const { data, error } = await window.sb.from('personal_lists').insert({ name }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteList(id) {
    const { error } = await window.sb.from('personal_lists').delete().eq('id', id);
    if (error) throw error;
  },
  async addToList(listId, placeId) {
    const { error } = await window.sb.from('personal_list_places')
      .upsert({ list_id: listId, place_id: placeId }, { onConflict: 'list_id,place_id' });
    if (error) throw error;
  },
  async removeFromList(listId, placeId) {
    const { error } = await window.sb.from('personal_list_places')
      .delete().eq('list_id', listId).eq('place_id', placeId);
    if (error) throw error;
  },
  async copyPlaceToTable(tableId, p, uid) {
    const { data: sp, error } = await window.sb.from('shared_places').insert({
      table_id: tableId, name: p.name, cuisine: p.cuisine, hood: p.hood, address: p.address,
      status: p.status === 'want' ? 'want' : 'visited', price: p.price, date: p.date || null,
      dish: p.dish, note: p.note, tags: p.tags || [],
      lat: p.lat == null ? null : p.lat, lng: p.lng == null ? null : p.lng,
      photos: (p.photos || []).filter(x => typeof x === 'string' && !x.startsWith('data:')),
    }).select().single();
    if (error) throw error;
    if (p.s && p.overall != null) {
      const { error: e2 } = await window.sb.from('shared_reviews').upsert({
        place_id: sp.id, user_id: uid, s: p.s, overall: p.overall, again: p.again, note: p.note || null,
      }, { onConflict: 'place_id,user_id' });
      if (e2) throw e2;
    }
    return sp;
  },

  // ── map data: shared places (with coords) across all my tables ──────────
  async fetchMapData(uid) {
    const sb = window.sb;
    const memQ = await sb.from('shared_table_members').select('table_id').eq('user_id', uid);
    if (memQ.error) throw memQ.error;
    const tableIds = (memQ.data || []).map(m => m.table_id);
    if (!tableIds.length) return [];
    const [tQ, pQ] = await Promise.all([
      sb.from('shared_tables').select('id,name').in('id', tableIds),
      sb.from('shared_places').select('*').in('table_id', tableIds),
    ]);
    if (tQ.error) throw tQ.error;
    if (pQ.error) throw pQ.error;
    const tName = {}; (tQ.data || []).forEach(t => { tName[t.id] = t.name; });
    const coords = (pQ.data || []).filter(p => p.lat != null && p.lng != null);
    const ids = coords.map(p => p.id);
    let reviews = [];
    if (ids.length) {
      const rQ = await sb.from('shared_reviews').select('place_id,overall,again').in('place_id', ids);
      if (!rQ.error) reviews = rQ.data || [];
    }
    return coords.map(sp => {
      const rv = reviews.filter(r => r.place_id === sp.id);
      const n = rv.length;
      const overall = n ? Math.round(rv.reduce((a, r) => a + Number(r.overall), 0) / n * 10) / 10 : null;
      const yes = rv.filter(r => r.again === true).length, no = rv.filter(r => r.again === false).length;
      return {
        id: sp.id, kind: 'shared', tableId: sp.table_id, tableName: tName[sp.table_id] || 'Table',
        name: sp.name, cuisine: sp.cuisine || 'Italian', hood: sp.hood || '', price: sp.price || 2,
        lat: Number(sp.lat), lng: Number(sp.lng), photos: sp.photos || [],
        overall, again: n ? (yes > no ? true : (no > yes ? false : null)) : null,
      };
    });
  },
};

// ── shared-table data hook ──────────────────────────────────────────────
// Maps shared places + everyone's reviews into the app's place shape:
// overall = group average; status = 'reviewed' once any verdict exists.
function useSharedTable(tableId, user) {
  const [data, setData] = React.useState(null);
  const [err, setErr] = React.useState(null);

  const refetch = React.useCallback(async () => {
    try {
      const sb = window.sb;
      const [tblQ, plQ, memQ] = await Promise.all([
        sb.from('shared_tables').select('*').eq('id', tableId).single(),
        sb.from('shared_places').select('*').eq('table_id', tableId).order('created_at', { ascending: false }),
        sb.from('shared_table_members').select('user_id').eq('table_id', tableId),
      ]);
      if (tblQ.error) throw tblQ.error;
      if (plQ.error) throw plQ.error;
      if (memQ.error) throw memQ.error;

      const placeIds = plQ.data.map(p => p.id);
      let reviews = [];
      if (placeIds.length) {
        const rvQ = await sb.from('shared_reviews').select('*').in('place_id', placeIds);
        if (rvQ.error) throw rvQ.error;
        reviews = rvQ.data;
      }

      const uids = [...new Set([
        ...memQ.data.map(m => m.user_id),
        ...reviews.map(r => r.user_id),
        ...plQ.data.map(p => p.created_by),
      ])];
      let profs = [];
      if (uids.length) {
        const pfQ = await sb.from('profiles').select('id,name').in('id', uids);
        profs = pfQ.data || [];
      }
      const nameOf = (id) => {
        const p = profs.find(x => x.id === id);
        return p ? p.name : 'Someone';
      };

      const places = plQ.data.map(sp => {
        const rv = reviews
          .filter(r => r.place_id === sp.id)
          .map(r => ({ ...r, overall: Number(r.overall), name: nameOf(r.user_id) }));
        const n = rv.length;
        const avg = (k) => n ? rv.reduce((a, r) => a + ((r.s && r.s[k]) || 0), 0) / n : null;
        const overall = n ? Math.round(rv.reduce((a, r) => a + r.overall, 0) / n * 10) / 10 : null;
        const yes = rv.filter(r => r.again === true).length;
        const no = rv.filter(r => r.again === false).length;
        return {
          id: sp.id, name: sp.name, cuisine: sp.cuisine || 'Italian', hood: sp.hood || '',
          address: sp.address || '', price: sp.price || 2, date: sp.date,
          dish: sp.dish || '', note: sp.note || '', tags: sp.tags || [],
          meal: [], occasion: [], photos: sp.photos || [],
          createdBy: sp.created_by, baseStatus: sp.status,
          status: n ? 'reviewed' : sp.status,
          overall,
          s: n ? { food: avg('food'), value: avg('value'), vibe: avg('vibe'), service: avg('service') } : null,
          again: n ? (yes > no ? true : (no > yes ? false : null)) : null,
          reviews: rv,
          myReview: rv.find(r => r.user_id === user.id) || null,
          byline: 'via ' + nameOf(sp.created_by) + (n ? ' · ' + n + (n === 1 ? ' verdict' : ' verdicts') : ''),
        };
      });

      setErr(null);
      setData({
        table: tblQ.data,
        members: memQ.data.map(m => ({ id: m.user_id, name: nameOf(m.user_id) })),
        places,
      });
    } catch (e) {
      setErr((e && e.message) || 'Could not load this table.');
    }
  }, [tableId]);

  React.useEffect(() => { setData(null); refetch(); }, [tableId]);

  const run = (fn) => (async () => {
    try { await fn(); await refetch(); }
    catch (e) { setErr((e && e.message) || 'Something went wrong.'); }
  })();

  return {
    data, err, refetch,
    addPlace: (d) => run(async () => {
      const photos = await window.cloudUploadPhotos(user.id, d.photos);
      const { error } = await window.sb.from('shared_places').insert({
        table_id: tableId, name: d.name, cuisine: d.cuisine, hood: d.hood, address: d.address,
        status: d.status === 'visited' ? 'visited' : 'want', price: d.price, date: d.date || null,
        dish: d.dish, note: d.note, tags: d.tags || [], photos,
        lat: d.lat == null ? null : d.lat, lng: d.lng == null ? null : d.lng,
      });
      if (error) throw error;
    }),
    updatePlace: (id, d) => run(async () => {
      const photos = await window.cloudUploadPhotos(user.id, d.photos);
      const { error } = await window.sb.from('shared_places').update({
        name: d.name, cuisine: d.cuisine, hood: d.hood, address: d.address,
        status: d.status === 'visited' ? 'visited' : 'want', price: d.price, date: d.date || null,
        dish: d.dish, note: d.note, tags: d.tags || [], photos,
        lat: d.lat == null ? null : d.lat, lng: d.lng == null ? null : d.lng,
      }).eq('id', id);
      if (error) throw error;
    }),
    deletePlace: (id) => run(async () => {
      const { error } = await window.sb.from('shared_places').delete().eq('id', id);
      if (error) throw error;
    }),
    markVisited: (id) => run(async () => {
      const { error } = await window.sb.from('shared_places')
        .update({ status: 'visited', date: window.todayISO() }).eq('id', id);
      if (error) throw error;
    }),
    saveVerdict: (placeId, v) => run(async () => {
      const { error } = await window.sb.from('shared_reviews').upsert({
        place_id: placeId, user_id: user.id,
        s: v.s, overall: v.overall, again: v.again, note: v.note || null,
      }, { onConflict: 'place_id,user_id' });
      if (error) throw error;
    }),
  };
}

Object.assign(window, { socialApi: social, useSharedTable });

}
