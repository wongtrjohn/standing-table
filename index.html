function CloudSignIn() {
  const [email, setEmail] = React.useState('');
  const [state, setState] = React.useState('idle'); // idle | busy | sent | error
  const [error, setError] = React.useState(null);
  const [otp, setOtp] = React.useState('');
  const [verifying, setVerifying] = React.useState(false);
  const [otpError, setOtpError] = React.useState(null);
  const [cooldown, setCooldown] = React.useState(0);
  React.useEffect(() => { if (state === 'sent') setCooldown(60); }, [state]);
  React.useEffect(() => {
    if (cooldown <= 0) return;
    const t = setTimeout(() => setCooldown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [cooldown]);
  let inviteCode = null;
  try { inviteCode = new URLSearchParams(window.location.search).get('join') || localStorage.getItem('st7-pending-join'); } catch (e) {}

  const send = async () => {
    const addr = email.trim();
    if (!addr || !addr.includes('@')) { setError('Enter a valid email address.'); setState('error'); return; }
    setState('busy');
    const { error: err } = await window.sb.auth.signInWithOtp({
      email: addr,
      options: { emailRedirectTo: window.location.origin + window.location.pathname },
    });
    if (err) { setError(err.message); setState('error'); }
    else setState('sent');
  };

  // typing the emailed 8-digit code signs in right here — no link tap needed
  // (essential for the installed/home-screen app, where the link opens the
  // browser instead and the session never reaches the app)
  const verify = async () => {
    const token = otp.trim();
    if (token.length < 8) { setOtpError('Enter the 8-digit code from the email.'); return; }
    setVerifying(true); setOtpError(null);
    const { error: err } = await window.sb.auth.verifyOtp({ email: email.trim(), token, type: 'email' });
    if (err) { setOtpError(err.message); setVerifying(false); }
    // on success the auth listener takes over and signs the user in
  };

  // resend, throttled to Supabase's 60s minimum between emails
  const resend = async () => {
    if (cooldown > 0) return;
    setCooldown(60); setOtpError(null);
    const { error: err } = await window.sb.auth.signInWithOtp({
      email: email.trim(),
      options: { emailRedirectTo: window.location.origin + window.location.pathname },
    });
    if (err) setOtpError(err.message);
  };

  return (
    <div className="fl sans" style={{
      height: '100%', background: 'var(--paper)', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', padding: '0 32px', textAlign: 'center',
    }}>
      <window.KLabel style={{ color: 'var(--spot)' }}>The Standing Table</window.KLabel>
      <div className="serif" style={{ fontSize: 34, fontWeight: 580, color: 'var(--ink)', letterSpacing: '-0.015em', lineHeight: 1.05, marginTop: 8 }}>
        Pull up<br />a chair.
      </div>

      {inviteCode && (
        <div className="sans" style={{ marginTop: 14, padding: '9px 14px', borderRadius: 999, background: 'var(--spot-soft)', color: 'var(--spot-2)', fontSize: 13 }}>
          You've been invited to a shared list — sign in and you'll join it automatically.
        </div>
      )}

      {state !== 'sent' ? (
        <React.Fragment>
          <p className="serif" style={{ fontSize: 15.5, fontStyle: 'italic', color: 'var(--ink-2)', lineHeight: 1.55, maxWidth: 300, marginTop: 14, textWrap: 'pretty' }}>
            Your email gets a sign-in link — no password to remember. Your places follow you to any device.
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 9, marginTop: 26, width: '100%', maxWidth: 300 }}>
            <input
              type="email" value={email} autoComplete="email" inputMode="email"
              onChange={e => { setEmail(e.target.value); if (state === 'error') setState('idle'); }}
              onKeyDown={e => { if (e.key === 'Enter') send(); }}
              placeholder="you@example.com"
              style={{
                width: '100%', boxSizing: 'border-box', border: '1px solid var(--line)', borderRadius: 12,
                padding: '13px 14px', background: 'var(--card)', color: 'var(--ink)', fontSize: 15,
                outline: 'none', textAlign: 'center', fontFamily: '"Hanken Grotesk",system-ui,sans-serif',
              }} />
            <button onClick={send} disabled={state === 'busy'} className="kl" style={{
              background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 12,
              padding: '14px 0', cursor: 'pointer', opacity: state === 'busy' ? 0.6 : 1,
            }}>{state === 'busy' ? 'Sending…' : 'Email me a sign-in link'}</button>
          </div>
          {state === 'error' && (
            <div className="sans" style={{ marginTop: 14, padding: '10px 14px', borderRadius: 10, background: 'var(--spot-soft)', color: 'var(--spot-2)', fontSize: 13, maxWidth: 300 }}>{error}</div>
          )}
        </React.Fragment>
      ) : (
        <React.Fragment>
          <p className="serif" style={{ fontSize: 15.5, fontStyle: 'italic', color: 'var(--ink-2)', lineHeight: 1.55, maxWidth: 300, marginTop: 14, textWrap: 'pretty' }}>
            A sign-in email is on its way to<br /><strong style={{ fontStyle: 'normal', color: 'var(--ink)' }}>{email.trim()}</strong>
          </p>
          <p className="sans" style={{ fontSize: 12.5, color: 'var(--ink-3)', lineHeight: 1.6, maxWidth: 280, marginTop: 10 }}>
            Tap the link in it — or type the 8-digit code from the same email below. Check spam if it hasn't arrived in a minute.
          </p>
          <div style={{ display: 'flex', gap: 8, marginTop: 18, width: '100%', maxWidth: 300 }}>
            <input
              value={otp} inputMode="numeric" autoComplete="one-time-code" maxLength={8}
              onChange={e => { setOtp(e.target.value.replace(/\D/g, '')); if (otpError) setOtpError(null); }}
              onKeyDown={e => { if (e.key === 'Enter') verify(); }}
              placeholder="8-digit code" aria-label="8-digit sign-in code"
              className="mono" style={{
                flex: 1, minWidth: 0, boxSizing: 'border-box', border: '1px solid var(--line)', borderRadius: 12,
                padding: '13px 12px', background: 'var(--card)', color: 'var(--ink)', fontSize: 16,
                outline: 'none', textAlign: 'center', letterSpacing: '0.12em',
              }} />
            <button onClick={verify} disabled={verifying} className="kl" style={{
              flexShrink: 0, background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 12,
              padding: '0 18px', cursor: 'pointer', opacity: verifying ? 0.6 : 1,
            }}>{verifying ? 'Checking…' : 'Sign in'}</button>
          </div>
          {otpError && (
            <div className="sans" style={{ marginTop: 12, padding: '10px 14px', borderRadius: 10, background: 'var(--spot-soft)', color: 'var(--spot-2)', fontSize: 13, maxWidth: 300 }}>{otpError}</div>
          )}
          <div style={{ display: 'flex', gap: 8, marginTop: 20 }}>
            <button onClick={resend} disabled={cooldown > 0} className="kl" style={{
              background: 'none', border: '1px solid var(--line)', borderRadius: 999,
              padding: '9px 16px', cursor: cooldown > 0 ? 'default' : 'pointer',
              color: cooldown > 0 ? 'var(--ink-3)' : 'var(--ink-2)', opacity: cooldown > 0 ? 0.7 : 1,
            }}>{cooldown > 0 ? 'Resend in ' + cooldown + 's' : 'Resend email'}</button>
            <button onClick={() => { setState('idle'); setOtp(''); setOtpError(null); setCooldown(0); }} className="kl" style={{
              background: 'none', border: '1px solid var(--line)', borderRadius: 999,
              padding: '9px 16px', cursor: 'pointer', color: 'var(--ink-2)',
            }}>Different email</button>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

// ── Phase 6 · read-only sharing: your public guide ────────────────────────
function GuideShareCard({ profile, onSaveProfile }) {
  const [name, setName] = React.useState(profile ? profile.name : '');
  const [handle, setHandle] = React.useState(profile ? (profile.handle || '') : '');
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const [copied, setCopied] = React.useState(false);

  React.useEffect(() => {
    if (profile) { setName(profile.name); setHandle(profile.handle || ''); }
  }, [profile && profile.id]);

  const card = {
    background: 'var(--card)', border: '1px solid var(--line)', borderRadius: 12,
    padding: '13px 15px', display: 'flex', flexDirection: 'column', gap: 10,
  };

  if (!profile) {
    return (
      <div style={card}>
        <span className="kl" style={{ color: 'var(--ink-3)' }}>My public guide</span>
        <span className="serif" style={{ fontSize: 13.5, fontStyle: 'italic', color: 'var(--ink-3)' }}>Loading sharing settings…</span>
      </div>
    );
  }

  const dirty = name.trim() !== profile.name || handle.trim() !== (profile.handle || '');
  const link = window.location.origin + '/g/' + (profile.handle || '');

  const run = async (fn, okMsg) => {
    setBusy(true); setMsg(null);
    try { await fn(); if (okMsg) setMsg(okMsg); }
    catch (e) { setMsg((e && e.message) || 'Something went wrong.'); }
    setBusy(false);
  };

  const inputStyle = {
    width: '100%', boxSizing: 'border-box', border: '1px solid var(--line)', borderRadius: 10,
    padding: '10px 12px', background: 'var(--paper)', color: 'var(--ink)', fontSize: 14,
    outline: 'none', fontFamily: '"Hanken Grotesk",system-ui,sans-serif',
  };

  const copy = () => {
    (navigator.clipboard ? navigator.clipboard.writeText(link) : Promise.reject()).then(
      () => { setCopied(true); setTimeout(() => setCopied(false), 1600); },
      () => window.prompt('Copy your guide link:', link)
    );
  };

  return (
    <div style={card}>
      <div>
        <span className="kl" style={{ color: 'var(--spot)' }}>My public guide</span>
        <p className="sans" style={{ fontSize: 12.5, color: 'var(--ink-3)', lineHeight: 1.55, margin: '4px 0 0', textWrap: 'pretty' }}>
          A read-only link to your <strong style={{ color: 'var(--ink-2)' }}>reviewed</strong> places — your personal food guide. Wishlist and visited spots stay private.
        </p>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
        <div style={{ display: 'flex', gap: 7 }}>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="Display name"
            aria-label="Display name" style={{ ...inputStyle, flex: 1 }} />
          <input value={handle} onChange={e => setHandle(e.target.value.toLowerCase().replace(/[^a-z0-9-]/g, ''))}
            placeholder="handle" aria-label="Guide handle" className="mono" style={{ ...inputStyle, flex: 1, fontSize: 13 }} />
        </div>
        {dirty && (
          <button disabled={busy} onClick={() => run(() => onSaveProfile({ name: name.trim() || 'Someone', handle: handle.trim() }), 'Saved.')}
            className="kl" style={{
              background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 10,
              padding: '10px 0', cursor: 'pointer', opacity: busy ? 0.6 : 1,
            }}>Save name &amp; handle</button>
        )}
      </div>

      <button disabled={busy} onClick={() => run(() => onSaveProfile({ guide_public: !profile.guide_public }))}
        className="kl" style={{
          background: profile.guide_public ? 'transparent' : 'var(--spot)',
          color: profile.guide_public ? 'var(--ink-2)' : 'var(--paper)',
          border: profile.guide_public ? '1px solid var(--line)' : 'none',
          borderRadius: 10, padding: '11px 0', cursor: 'pointer', opacity: busy ? 0.6 : 1,
        }}>{profile.guide_public ? 'Make my guide private' : 'Publish my guide'}</button>

      {profile.guide_public && (
        <button onClick={copy} style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8,
          background: 'var(--spot-soft)', border: 'none', borderRadius: 10, padding: '10px 12px', cursor: 'pointer',
        }}>
          <span className="mono" style={{ fontSize: 11.5, color: 'var(--spot-2)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{link}</span>
          <span className="kl" style={{ color: 'var(--spot-2)', flexShrink: 0 }}>{copied ? 'Copied!' : 'Copy'}</span>
        </button>
      )}

      {msg && <span className="sans" style={{ fontSize: 12.5, color: 'var(--spot-2)' }}>{msg}</span>}
    </div>
  );
}

  );
}

<script type="text/babel">
// ── inlined from phase6-src/places-live.jsx ──
// places-live.jsx — REAL Google Places search for the Add Place flow (Phase 5).
// Uses Places API (New) REST endpoints with window.GMAPS_KEY.
// Exports: window.LiveSearch

// ── Google type → editorial cuisine mapping ───────────────────────────────
const G_CUISINE_MAP = [
  ['french_restaurant', 'French'],
  ['italian_restaurant', 'Italian'], ['pizza_restaurant', 'Italian'],
  ['korean_restaurant', 'Korean'], ['barbecue_restaurant', 'Korean'],
  ['japanese_restaurant', 'Japanese'], ['sushi_restaurant', 'Japanese'], ['ramen_restaurant', 'Japanese'],
  ['mexican_restaurant', 'Mexican'],
  ['indian_restaurant', 'Indian'],
  ['bakery', 'Bakery'], ['bagel_shop', 'Bakery'],
  ['dessert_shop', 'Dessert'], ['ice_cream_shop', 'Dessert'], ['dessert_restaurant', 'Dessert'], ['chocolate_shop', 'Dessert'],
  ['vegetarian_restaurant', 'Vegetarian'], ['vegan_restaurant', 'Vegetarian'],
  ['wine_bar', 'Cocktail Bar'], ['bar', 'Cocktail Bar'],
  ['pub', 'Gastropub'], ['american_restaurant', 'Gastropub'], ['hamburger_restaurant', 'Gastropub'],
  ['cafe', 'Coffee'], ['coffee_shop', 'Coffee'],
  ['thai_restaurant', 'Thai'],
];

function gCuisineFromTypes(types) {
  for (const [t, c] of G_CUISINE_MAP) if ((types || []).includes(t)) return c;
  return 'Italian'; // form default — user can change it
}

const G_PRICE_MAP = {
  PRICE_LEVEL_INEXPENSIVE: 1, PRICE_LEVEL_MODERATE: 2,
  PRICE_LEVEL_EXPENSIVE: 3, PRICE_LEVEL_VERY_EXPENSIVE: 4,
};

// ── API calls ─────────────────────────────────────────────────────────────
async function gAutocomplete(input) {
  // No includedPrimaryTypes: Google's "primary type" excludes many eateries
  // (ice-cream shops, fine-dining, pubs, food courts, places tagged as a
  // tourist attraction, etc.), so restricting it hid valid restaurants. We let
  // everything through here and lean on the Text Search fallback below.
  const res = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': window.GMAPS_KEY },
    body: JSON.stringify({ input }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error((body.error && body.error.message) || ('Search failed (' + res.status + ')'));
  }
  const data = await res.json();
  return (data.suggestions || [])
    .map(s => s.placePrediction).filter(Boolean)
    .map(p => ({
      placeId: p.placeId,
      name: (p.structuredFormat && p.structuredFormat.mainText && p.structuredFormat.mainText.text) || (p.text && p.text.text) || '',
      address: (p.structuredFormat && p.structuredFormat.secondaryText && p.structuredFormat.secondaryText.text) || '',
    }));
}

// Text Search fallback — the same engine the CSV importer uses, which finds
// places autocomplete misses. Returns the same shape as gAutocomplete.
async function gTextSearchPredictions(query) {
  const res = await fetch('https://places.googleapis.com/v1/places:searchText', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Goog-Api-Key': window.GMAPS_KEY,
      'X-Goog-FieldMask': 'places.id,places.displayName,places.formattedAddress',
    },
    body: JSON.stringify({ textQuery: query, maxResultCount: 8 }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error((body.error && body.error.message) || ('Search failed (' + res.status + ')'));
  }
  const data = await res.json();
  return (data.places || []).map(p => ({
    placeId: p.id,
    name: (p.displayName && p.displayName.text) || '',
    address: p.formattedAddress || '',
  }));
}

async function gPhotoDataUrl(photoName) {
  const url = 'https://places.googleapis.com/v1/' + photoName + '/media?maxWidthPx=900&key=' + window.GMAPS_KEY;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('photo fetch failed');
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(blob);
    });
  } catch (e) {
    return url; // hotlink fallback — works in <img>, just not uploaded to your storage
  }
}

async function gDetails(placeId) {
  const res = await fetch('https://places.googleapis.com/v1/places/' + placeId, {
    headers: {
      'X-Goog-Api-Key': window.GMAPS_KEY,
      'X-Goog-FieldMask': 'id,displayName,formattedAddress,addressComponents,types,priceLevel,photos,location,regularOpeningHours,utcOffsetMinutes,websiteUri',
    },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error((body.error && body.error.message) || ('Could not load place (' + res.status + ')'));
  }
  const d = await res.json();

  const comp = (type) => {
    const c = (d.addressComponents || []).find(c => (c.types || []).includes(type));
    return c ? (c.longText || c.shortText) : null;
  };
  const streetNum = comp('street_number'), route = comp('route');
  const address = (streetNum && route) ? (streetNum + ' ' + route)
    : (d.formattedAddress ? d.formattedAddress.split(',')[0] : '');
  const hood = comp('neighborhood') || comp('sublocality_level_1') || comp('sublocality') || comp('locality') || '';

  const prefill = {
    name: (d.displayName && d.displayName.text) || '',
    address, hood,
    cuisine: gCuisineFromTypes(d.types),
    price: G_PRICE_MAP[d.priceLevel] || 2,
    lat: (d.location && d.location.latitude != null) ? d.location.latitude : null,
    lng: (d.location && d.location.longitude != null) ? d.location.longitude : null,
    photos: [],
  };
  const oh = d.regularOpeningHours;
  if (oh && ((oh.periods && oh.periods.length) || (oh.weekdayDescriptions && oh.weekdayDescriptions.length))) {
    prefill.hours = {
      periods: oh.periods || [],
      weekdayDescriptions: oh.weekdayDescriptions || [],
      utcOffset: (d.utcOffsetMinutes != null) ? d.utcOffsetMinutes : null,
    };
  }
  if (d.websiteUri) prefill.website = d.websiteUri;
  if (d.photos && d.photos[0] && d.photos[0].name) {
    prefill.photos = [await gPhotoDataUrl(d.photos[0].name)];
  }
  return prefill;
}

          width: '100%', background: 'none', border: '1px solid var(--line)', borderRadius: 12,

    </div>
  );

// ════════════════════════════════════════════════════════════════════════
// CSV IMPORT — match each spreadsheet row to a Google place (Places API New)
// Expects columns: Name, Category, Notes, Address (header row, any order/case).
// ════════════════════════════════════════════════════════════════════════

// Minimal RFC-4180-ish CSV parser → array of row objects keyed by lowercased header.
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  text = String(text).replace(/^﻿/, ''); // strip BOM
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }   // escaped quote
        else inQuotes = false;
      } else field += c;
    } else if (c === '"') inQuotes = true;
    else if (c === ',') { row.push(field); field = ''; }
    else if (c === '\r') { /* ignore */ }
    else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
    else field += c;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const nonEmpty = rows.filter(r => r.some(c => c.trim() !== ''));
  if (!nonEmpty.length) return [];
  const headers = nonEmpty[0].map(h => h.trim().toLowerCase());
  return nonEmpty.slice(1).map(r => {
    const o = {};
    headers.forEach((h, idx) => { o[h] = (r[idx] || '').trim(); });
    return o;
  });
}

// CSV "Category" → a valid app cuisine (used as the preferred cuisine when present).
const CSV_CATEGORY_MAP = {
  'cafe': 'Cafe', 'coffee': 'Coffee', 'pizza': 'Italian', 'italian': 'Italian',
  'sandwich': 'Western', 'fish and chips': 'Western',
  'vietnamese': 'Vietnamese', 'thai': 'Thai',
  'pastry': 'Bakery', 'bakery': 'Bakery', 'dessert': 'Bakery',
  'korean': 'Korean', 'chinese': 'Chinese', 'japanese': 'Japanese', 'asian': 'Asian',
  'charcoal chicken': 'Asian', 'drinks': 'Coffee',
  'indian': 'Indian', 'mexican': 'Mexican', 'french': 'French', 'western': 'Western',
};
function cuisineFromCategory(cat) {
  if (!cat) return null;
  const key = cat.trim().toLowerCase();
  if (CSV_CATEGORY_MAP[key]) return CSV_CATEGORY_MAP[key];
  const first = key.split('/')[0].trim();   // e.g. "Sandwich / Fish and chips"
  return CSV_CATEGORY_MAP[first] || null;
}

// Places API (New) Text Search — best single match for "name, address".
async function gTextSearch(query, wantPhoto, wantHours, wantWebsite) {
  const res = await fetch('https://places.googleapis.com/v1/places:searchText', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Goog-Api-Key': window.GMAPS_KEY,
      'X-Goog-FieldMask': 'places.id,places.displayName,places.formattedAddress,places.addressComponents,places.types,places.priceLevel,places.location'
        + (wantPhoto ? ',places.photos' : '')
        + (wantHours ? ',places.regularOpeningHours,places.utcOffsetMinutes' : '')
        + (wantWebsite ? ',places.websiteUri' : ''),
    },
    body: JSON.stringify({ textQuery: query, maxResultCount: 1 }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error((body.error && body.error.message) || ('Search failed (' + res.status + ')'));
  }
  const data = await res.json();
  return (data.places && data.places[0]) || null;
}

// A Google place object → the app's prefill shape (same mapping as gDetails).
async function gPlaceToPrefill(d, wantPhoto, wantHours, wantWebsite) {
  const comp = (type) => {
    const c = (d.addressComponents || []).find(c => (c.types || []).includes(type));
    return c ? (c.longText || c.shortText) : null;
  };
  const streetNum = comp('street_number'), route = comp('route');
  const address = (streetNum && route) ? (streetNum + ' ' + route)
    : (d.formattedAddress ? d.formattedAddress.split(',')[0] : '');
  const hood = comp('neighborhood') || comp('sublocality_level_1') || comp('sublocality') || comp('locality') || '';
  const prefill = {
    name: (d.displayName && d.displayName.text) || '',
    address, hood,
    cuisine: gCuisineFromTypes(d.types),
    price: G_PRICE_MAP[d.priceLevel] || 2,
    lat: (d.location && d.location.latitude != null) ? d.location.latitude : null,
    lng: (d.location && d.location.longitude != null) ? d.location.longitude : null,
    photos: [],
  };
  if (wantHours) {
    const oh = d.regularOpeningHours;
    if (oh && ((oh.periods && oh.periods.length) || (oh.weekdayDescriptions && oh.weekdayDescriptions.length))) {
      prefill.hours = {
        periods: oh.periods || [],
        weekdayDescriptions: oh.weekdayDescriptions || [],
        utcOffset: (d.utcOffsetMinutes != null) ? d.utcOffsetMinutes : null,
      };
    }
  }
  if (wantWebsite && d.websiteUri) prefill.website = d.websiteUri;
  if (wantPhoto && d.photos && d.photos[0] && d.photos[0].name) {
    prefill.photos = [await gPhotoDataUrl(d.photos[0].name)];
  }
  return prefill;
}

// Turn parsed CSV rows into ready-to-save place objects, enriched via Google.
// opts: { status='want', photos=true, onProgress(done, total, name) }
// Returns { places, matched, total } — rows with no Google hit keep their CSV data.
async function csvRowsToPlaces(rows, opts) {
  opts = opts || {};
  const wantPhoto = opts.photos !== false;
  const status = opts.status || 'want';
  const onProgress = opts.onProgress || function () {};
  const out = [];
  let matched = 0;
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i] || {};
    const name = (r.name || r.place || '').trim();
    const csvAddr = (r.address || '').trim();
    const notes = (r.notes || r.note || '').trim();
    const catCuisine = cuisineFromCategory(r.category);
    onProgress(i, rows.length, name);
    if (!name && !csvAddr) continue;

    // Fallback: the raw CSV data, in case Google finds nothing.
    let place = {
      name: name || csvAddr,
      address: csvAddr ? csvAddr.split(',')[0] : '',
      hood: '', cuisine: catCuisine || 'Italian', price: 2, lat: null, lng: null, photos: [],
      status, note: notes, tags: [], meal: [], occasion: [], date: null,
    };
    try {
      const q = [name, csvAddr].filter(Boolean).join(', ');
      const g = q ? await gTextSearch(q, wantPhoto) : null;
      if (g) {
        matched++;
        const pf = await gPlaceToPrefill(g, wantPhoto);
        place = {
          ...place,
          name: name || pf.name,                 // keep the name as written in the CSV
          address: pf.address || place.address,
          hood: pf.hood || place.hood,
          cuisine: catCuisine || pf.cuisine,      // prefer the CSV's category when present
          price: pf.price,
          lat: pf.lat, lng: pf.lng,               // coordinates → shows up on the Map
          photos: pf.photos,
        };
      }
    } catch (e) {
      // Keep the CSV fallback for this row and move on — one bad row won't sink the import.
    }
    out.push(place);
  }
  onProgress(rows.length, rows.length, '');
  return { places: out, matched, total: out.length };
}

Object.assign(window, { LiveSearch, parseCSV, csvRowsToPlaces, gTextSearch, gPlaceToPrefill });

</script>
<script type="text/babel">
// ── inlined from phase6-src/store-social.jsx ──
// store-social.jsx — profiles, public guides, shared lists (Phase 6).

const social = {

  async ensureProfile(user) {

    if (error) throw error;
    if (data) return data;
    const base = (user.email || 'someone').split('@')[0].toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-+|-+$)/g, '').slice(0, 18) || 'table';

      name: (user.email || 'Someone').split('@')[0],
      handle: base + '-' + Math.random().toString(36).slice(2, 6),
      guide_public: false,
    };
    const { error: e2 } = await window.sb.from('profiles').insert(row);
    if (e2) throw e2;
    return row;
  },

  async saveProfile(userId, patch) {
    const { data, error } = await window.sb.from('profiles').update(patch).eq('id', userId).select().single();
    if (error) {
      if (String(error.code) === '23505') throw new Error('That handle is taken — try another.');

  // ── public guide (no sign-in required) ─────────────────────────────────
  async fetchGuide(handle) {

      .select('*').eq('owner', prof.id).eq('status', 'reviewed')
      .order('overall', { ascending: false });
    if (e2) throw e2;
    const places = (rows || []).map(window.cloudRowToPlace);

    // personal lists are public-readable when the guide is published (Phase 7G)
    let lists = [];
    try {
      const lQ = await window.sb.from('personal_lists')
        .select('id,name,created_at,personal_list_places(place_id)')
        .eq('owner', prof.id).eq('is_public', true).order('created_at');
      if (!lQ.error) {
        const byId = {}; places.forEach(p => { byId[p.id] = p; });
        lists = (lQ.data || []).map(l => ({
          id: l.id, name: l.name,
          places: (l.personal_list_places || []).map(x => byId[x.place_id]).filter(Boolean),
        })).filter(l => l.places.length);
      }

  // ── tables registry ─────────────────────────────────────────────────────
  async fetchTables() {
    const { data, error } = await window.sb.from('shared_tables').select('*').order('created_at');
    if (error) throw error;
    return data;
  },

  // latest activity (new places or verdicts) per table → { tableId: isoTimestamp }
  async fetchTableActivity(tableIds) {
    if (!tableIds || !tableIds.length) return {};
    const act = {};
    const bump = (tid, ts) => { if (tid && ts && (!act[tid] || ts > act[tid])) act[tid] = ts; };
    const pQ = await window.sb.from('shared_places').select('id,table_id,created_at').in('table_id', tableIds);
    if (pQ.error) throw pQ.error;
    const placeTable = {};
    (pQ.data || []).forEach(p => { placeTable[p.id] = p.table_id; bump(p.table_id, p.created_at); });
    const placeIds = Object.keys(placeTable);
    if (placeIds.length) {
      const rQ = await window.sb.from('shared_reviews').select('place_id,created_at').in('place_id', placeIds);
      if (!rQ.error) (rQ.data || []).forEach(r => bump(placeTable[r.place_id], r.created_at));

    return act;

  async createTable(name) {
    const { data, error } = await window.sb.from('shared_tables').insert({ name }).select().single();

  },

  async leaveTable(tableId, userId) {
    const { error } = await window.sb.from('shared_table_members')

  async fetchLists(ownerId) {

    let q = window.sb
      .from('personal_lists')

  async createList(name) {

  },
  async copyPlaceToTable(tableId, p, uid) {

    const dataUrls = [];
    for (const u of (p.photos || []).filter(x => typeof x === 'string' && !x.startsWith('data:'))) {
      try {
        const blob = await (await fetch(u)).blob();

    if (!photos.length) photos = (p.photos || []).filter(x => typeof x === 'string' && x.indexOf('data:') !== 0);

    const { data: sp, error } = await window.sb.from('shared_places').insert({
      table_id: tableId, name: p.name, cuisine: p.cuisine, hood: p.hood, address: p.address,
      status: p.status === 'want' ? 'want' : 'visited', price: p.price, date: p.date || null,
      dish: p.dish, note: p.note, tags: p.tags || [],
      lat: p.lat == null ? null : p.lat, lng: p.lng == null ? null : p.lng,
      hours: p.hours || null, website: p.website || null,
      photos,
    }).select().single();
    if (error) throw error;
    if (p.s && p.overall != null) {
      const { error: e2 } = await window.sb.from('shared_reviews').upsert({
        place_id: sp.id, user_id: uid, s: p.s, overall: p.overall, again: p.again, note: p.note || null,
        spent: p.spent == null ? null : p.spent, people: p.people == null ? null : p.people,
      }, { onConflict: 'place_id,user_id' });
      if (e2) throw e2;
    }
    return sp;
  },

  // ── map data: shared places (with coords) across all my tables ──────────
  async fetchMapData(uid) {
    const sb = window.sb;
    const memQ = await sb.from('shared_table_members').select('table_id').eq('user_id', uid);
    if (memQ.error) throw memQ.error;
    const tableIds = (memQ.data || []).map(m => m.table_id);
    if (!tableIds.length) return [];
    const [tQ, pQ] = await Promise.all([
      sb.from('shared_tables').select('id,name').in('id', tableIds),
      sb.from('shared_places').select('*').in('table_id', tableIds),
    ]);
    if (tQ.error) throw tQ.error;
    if (pQ.error) throw pQ.error;
    const tName = {}; (tQ.data || []).forEach(t => { tName[t.id] = t.name; });
    const coords = (pQ.data || []).filter(p => p.lat != null && p.lng != null);
    const ids = coords.map(p => p.id);
    let reviews = [];
    if (ids.length) {
      const rQ = await sb.from('shared_reviews').select('place_id,overall,again').in('place_id', ids);
      if (!rQ.error) reviews = rQ.data || [];
    }
    let favIds = new Set();
    if (ids.length) {
      const fQ = await sb.from('shared_favourites').select('place_id').eq('user_id', uid).in('place_id', ids);
      if (!fQ.error) favIds = new Set((fQ.data || []).map(r => r.place_id));
    }
    return coords.map(sp => {
      const rv = reviews.filter(r => r.place_id === sp.id);
      const n = rv.length;
      const overall = n ? Math.round(rv.reduce((a, r) => a + Number(r.overall), 0) / n * 10) / 10 : null;
      const yes = rv.filter(r => r.again === true).length, no = rv.filter(r => r.again === false).length;
      return {
        id: sp.id, kind: 'shared', tableId: sp.table_id, tableName: tName[sp.table_id] || 'List',
        name: sp.name, cuisine: sp.cuisine || 'Italian', hood: sp.hood || '', price: sp.price || 2,
        lat: Number(sp.lat), lng: Number(sp.lng), photos: sp.photos || [],
        hours: sp.hours || null,
        status: n ? 'reviewed' : (sp.status || 'want'),
        overall, again: n ? (yes > no ? true : (no > yes ? false : null)) : null,
        fav: favIds.has(sp.id),
      };
    });
  },
};

// ── shared-table data hook ──────────────────────────────────────────────
// Maps shared places + everyone's reviews into the app's place shape:
// overall = group average; status = 'reviewed' once any verdict exists.
function useSharedTable(tableId, user) {
  const [data, setData] = React.useState(null);
  const [err, setErr] = React.useState(null);
  const pendingRef = React.useRef(null); // soft-deleted places: { ids: [...], timer }
  const [undo, setUndo] = React.useState(null);

  const commitPending = () => {
    const p = pendingRef.current;
    if (!p) return;
    clearTimeout(p.timer);
    pendingRef.current = null;
    setUndo(null);
    (async () => {
      try {
        const { error } = await window.sb.from('shared_places').delete().in('id', p.ids);
        if (error) throw error;
      } catch (e) { setErr((e && e.message) || 'Could not delete.'); }
    })();
  };

  const refetch = React.useCallback(async () => {
    try {
      const sb = window.sb;
      const [tblQ, plQ, memQ] = await Promise.all([
        sb.from('shared_tables').select('*').eq('id', tableId).single(),
        sb.from('shared_places').select('*').eq('table_id', tableId).order('created_at', { ascending: false }),
        sb.from('shared_table_members').select('user_id').eq('table_id', tableId),
      ]);
      if (tblQ.error) throw tblQ.error;
      if (plQ.error) throw plQ.error;
      if (memQ.error) throw memQ.error;

      const placeIds = plQ.data.map(p => p.id);
      let reviews = [];
      if (placeIds.length) {
        const rvQ = await sb.from('shared_reviews').select('*').in('place_id', placeIds);
        if (rvQ.error) throw rvQ.error;
        reviews = rvQ.data;
      }
      // Favourites in this list (per-member, like verdicts): count how many
      // members starred each place, and track which ones are mine. Soft-fails so
      // the list still loads if the shared_favourites table/policy isn't set up.
      const favCounts = {};
      const myFavs = new Set();
      if (placeIds.length) {
        const fvQ = await sb.from('shared_favourites').select('place_id,user_id').in('place_id', placeIds);
        if (!fvQ.error) (fvQ.data || []).forEach(r => {
          favCounts[r.place_id] = (favCounts[r.place_id] || 0) + 1;
          if (r.user_id === user.id) myFavs.add(r.place_id);
        });
      }

      const uids = [...new Set([
        ...memQ.data.map(m => m.user_id),
        ...reviews.map(r => r.user_id),
        ...plQ.data.map(p => p.created_by),
      ])];
      let profs = [];
      if (uids.length) {
        const pfQ = await sb.from('profiles').select('id,name').in('id', uids);
        profs = pfQ.data || [];
      }
      const nameOf = (id) => {
        const p = profs.find(x => x.id === id);
        return p ? p.name : 'Someone';
      };

      const places = plQ.data.map(sp => {
        const rv = reviews
          .filter(r => r.place_id === sp.id)
          .map(r => ({ ...r, overall: Number(r.overall),
            spent: r.spent == null ? null : Number(r.spent),
            people: r.people == null ? null : Number(r.people),
            name: nameOf(r.user_id) }));
        const n = rv.length;
        const avg = (k) => n ? rv.reduce((a, r) => a + ((r.s && r.s[k]) || 0), 0) / n : null;
        const overall = n ? Math.round(rv.reduce((a, r) => a + r.overall, 0) / n * 10) / 10 : null;
        const yes = rv.filter(r => r.again === true).length;
        const no = rv.filter(r => r.again === false).length;
        return {
          id: sp.id, name: sp.name, cuisine: sp.cuisine || 'Italian', hood: sp.hood || '',
          address: sp.address || '', price: sp.price || 2, date: sp.date,
          dish: sp.dish || '', note: sp.note || '', tags: sp.tags || [],
          meal: [], occasion: [], photos: sp.photos || [],
          lat: sp.lat == null ? null : Number(sp.lat), lng: sp.lng == null ? null : Number(sp.lng),
          hours: sp.hours || null, website: sp.website || null,
          createdBy: sp.created_by, baseStatus: sp.status,
          status: n ? 'reviewed' : sp.status,
          overall,
          s: n ? { food: avg('food'), value: avg('value'), vibe: avg('vibe'), service: avg('service') } : null,
          again: n ? (yes > no ? true : (no > yes ? false : null)) : null,
          reviews: rv,
          myReview: rv.find(r => r.user_id === user.id) || null,
          fav: myFavs.has(sp.id),
          favCount: favCounts[sp.id] || 0,
          byline: 'via ' + nameOf(sp.created_by) + (n ? ' · ' + n + (n === 1 ? ' verdict' : ' verdicts') : ''),
        };
      });

      setErr(null);
      setData({
        table: tblQ.data,
        members: memQ.data.map(m => ({ id: m.user_id, name: nameOf(m.user_id) })),
        places,
      });
    } catch (e) {
      setErr((e && e.message) || 'Could not load this list.');
    }
  }, [tableId]);

  React.useEffect(() => { setData(null); refetch(); }, [tableId]);

  const run = (fn) => (async () => {
    commitPending(); // settle any soft delete before refetching, so it can't reappear
    try { await fn(); await refetch(); }
    catch (e) { setErr((e && e.message) || 'Something went wrong.'); }
  })();

  const softDelete = (ids) => {
    if (!ids || !ids.length) return;
    commitPending();
    setData(prev => prev ? { ...prev, places: prev.places.filter(p => !ids.includes(p.id)) } : prev);
    const timer = setTimeout(commitPending, 5000);
    pendingRef.current = { ids, timer };
    setUndo({ count: ids.length, key: Date.now() });
  };

  return {
    data, err, refetch,
    addPlace: (d) => run(async () => {
      const photos = await window.cloudUploadPhotos(user.id, d.photos);
      const { error } = await window.sb.from('shared_places').insert({
        table_id: tableId, name: d.name, cuisine: d.cuisine, hood: d.hood, address: d.address,
        status: d.status === 'visited' ? 'visited' : 'want', price: d.price, date: d.date || null,
        dish: d.dish, note: d.note, tags: d.tags || [], photos,
        lat: d.lat == null ? null : d.lat, lng: d.lng == null ? null : d.lng,
        hours: d.hours || null, website: d.website || null,
      });
      if (error) throw error;
    }),
    updatePlace: (id, d) => run(async () => {
      const photos = await window.cloudUploadPhotos(user.id, d.photos);
      const { error } = await window.sb.from('shared_places').update({
        name: d.name, cuisine: d.cuisine, hood: d.hood, address: d.address,
        status: d.status === 'visited' ? 'visited' : 'want', price: d.price, date: d.date || null,
        dish: d.dish, note: d.note, tags: d.tags || [], photos,
        lat: d.lat == null ? null : d.lat, lng: d.lng == null ? null : d.lng,
        hours: d.hours || null, website: d.website || null,
      }).eq('id', id);
      if (error) throw error;
    }),
    deletePlaces: softDelete,
    deletePlace: (id) => softDelete([id]),
    undo,
    undoDelete: () => {
      const p = pendingRef.current;
      if (!p) return;
      clearTimeout(p.timer);
      pendingRef.current = null;
      setUndo(null);
      refetch(); // row is still on the server — refetch restores it
    },
    markVisited: (id) => run(async () => {
      const { error } = await window.sb.from('shared_places')
        .update({ status: 'visited', date: window.todayISO() }).eq('id', id);
      if (error) throw error;
    }),
    saveVerdict: (placeId, v) => run(async () => {
      const { error } = await window.sb.from('shared_reviews').upsert({
        place_id: placeId, user_id: user.id,
        s: v.s, overall: v.overall, again: v.again, note: v.note || null,
        spent: v.spent == null ? null : v.spent, people: v.people == null ? null : v.people,
      }, { onConflict: 'place_id,user_id' });
      if (error) throw error;
    }),
    // My own favourite within this shared list (each member keeps their own).
    toggleFav: (id) => run(async () => {
      const cur = ((data && data.places) || []).find(x => x.id === id);
      if (cur && cur.fav) {
        const { error } = await window.sb.from('shared_favourites')
          .delete().eq('place_id', id).eq('user_id', user.id);
        if (error) throw error;
      } else {
        const { error } = await window.sb.from('shared_favourites')
          .upsert({ place_id: id, user_id: user.id }, { onConflict: 'place_id,user_id' });
        if (error) throw error;
      }
    }),
  };
}

Object.assign(window, { socialApi: social, useSharedTable });

</script>

function TableMeta({ table, members }) {

  const [open, setOpen] = React.useState(false);

// ── shared place detail: group verdicts ───────────────────────────────────

    <div className="fl sans" style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)' }}>

        <div style={{ padding: '14px 20px 32px' }}>

              <div style={{ display: 'flex', flexDirection: 'column', gap: 7, marginTop: 14 }}>

          {p.dish ? (

              <div className="serif" style={{ fontSize: 17, fontWeight: 560, color: 'var(--spot-2)', marginTop: 3 }}>{p.dish}</div>

              }}>We went — open it for verdicts</button>

            {p.status !== 'want' && (

                padding: '13px 0', cursor: 'pointer', width: '100%',
              }}>{p.myReview ? 'Edit my verdict' : 'Add my verdict'}</button>

            {onAddToMine && (

                border: '1px solid var(--line)', borderRadius: 12, padding: '13px 0',

            )}
            <div style={{ display: 'flex', gap: 8 }}>

                flex: 1, background: 'transparent', color: 'var(--ink-3)', border: '1px solid var(--line)',
                borderRadius: 12, padding: '12px 0', cursor: 'pointer',

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── add / edit a shared place (basics only — verdicts are separate) ──────
function SharedPlaceForm({ place, prefill, onSave, onCancel }) {
  const cuisines = Object.keys(window.CUISINE_META);
  const [d, setD] = React.useState(() => ({
    name: '', cuisine: 'Italian', hood: '', address: '', price: 2,
    status: 'want', date: null, dish: '', note: '', tags: [], photos: [], website: '',
    ...(prefill || {}), ...(place || {}),

  const [err, setErr] = React.useState(null);
  const set = (patch) => setD(prev => ({ ...prev, ...patch }));

  return (
    <div className="fl sans" style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)' }}>
      <div style={{ padding: '14px 20px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
        <button onClick={onCancel} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', padding: '6px 0' }}>Cancel</button>
        <window.KLabel>{place ? 'Edit Place' : 'Add to the List'}</window.KLabel>
        <button onClick={save} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--spot)', fontWeight: 600, padding: '6px 0' }}>Save</button>
      </div>
      <window.Rule style={{ marginLeft: 20, marginRight: 20, width: 'auto' }} />

      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 20px 40px' }}>
        {err && <div className="sans" style={{ marginTop: 14, padding: '10px 13px', borderRadius: 10, background: 'var(--spot-soft)', color: 'var(--spot-2)', fontSize: 13 }}>{err}</div>}

        <window.AFField label="Place name">
          <window.AFInput value={d.name} onChange={e => set({ name: e.target.value })} placeholder="e.g. Maya Oaxaca"
            className="serif" style={{ fontSize: 19, fontFamily: '"Cormorant Garamond",Georgia,serif', fontWeight: 500 }} />
        </window.AFField>

        <div style={{ display: 'flex', gap: 10 }}>
          <window.AFField label="Cuisine" style={{ flex: 1 }}>

              {cuisines.map(c => <option key={c} value={c}>{c}</option>)}

          </window.AFField>
          <window.AFField label="Neighborhood" style={{ flex: 1 }}>

        </div>

        <window.AFField label="Address (optional)">
          <window.AFInput value={d.address || ''} onChange={e => set({ address: e.target.value })} placeholder="Street address" />
        </window.AFField>

        <window.AFField label="Website (optional)">
          <window.AFInput type="url" inputMode="url" value={d.website || ''} onChange={e => set({ website: e.target.value })} placeholder="https://…" />
        </window.AFField>

        <window.AFField label="Price level">
          <div style={{ display: 'flex', gap: 4 }}>
            {[1, 2, 3, 4].map(i => (
              <button key={i} type="button" onClick={() => set({ price: i })} aria-label={'Price level ' + i + ' of 4'} aria-pressed={i <= d.price} className="mono" style={{
                flex: 1, padding: '8px 0', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 500,
                border: `1px solid ${i <= d.price ? 'var(--ink)' : 'var(--line)'}`,
                background: i <= d.price ? 'var(--ink)' : 'transparent', color: i <= d.price ? 'var(--paper)' : 'var(--ink-3)',
              }}>$</button>

        <window.AFField label="Signature dish (optional)">

        <window.AFField label="Note to the group (optional)">
          <textarea value={d.note || ''} onChange={e => set({ note: e.target.value })} rows={2}
            placeholder="Why it's on the list…"
            style={{ ...window.afInputStyle, fontFamily: '"Cormorant Garamond",Georgia,serif', fontSize: 15, lineHeight: 1.5, resize: 'vertical' }}></textarea>
        </window.AFField>

        <window.AFField label="Photos · up to 3">
          <window.AFPhotos photos={d.photos || []} onChange={photos => set({ photos })} />

      </div>
    </div>
  );
}

// ── your personal verdict on a shared place ───────────────────────────────
function VerdictForm({ place, onSave, onCancel }) {
  const existing = place.myReview;
  // axes start unset for a fresh verdict — defaults anchor everyone's scores
  const [s, setS] = React.useState(() => (existing && existing.s) || { food: null, value: null, vibe: null, service: null });
  const [again, setAgain] = React.useState(existing ? existing.again : true);
  const [note, setNote] = React.useState((existing && existing.note) || '');
  const [spent, setSpent] = React.useState(existing && existing.spent != null ? existing.spent : null);
  const [people, setPeople] = React.useState(existing && existing.people != null ? existing.people : null);
  const done = window.AXIS_ORDER.every(k => s[k] != null);
  const overall = done ? window.calcWeighted(s) : null;

  return (
    <div className="fl sans" style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)' }}>
      <div style={{ padding: '14px 20px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
        <button onClick={onCancel} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', padding: '6px 0' }}>Cancel</button>
        <window.KLabel>My Verdict · {place.name}</window.KLabel>
        <button disabled={!done} onClick={() => done && onSave({ s, again, note, overall: Math.round(overall * 10) / 10, spent, people })} className="kl"
          style={{ background: 'none', border: 'none', cursor: done ? 'pointer' : 'default', color: done ? 'var(--spot)' : 'var(--ink-3)', fontWeight: 600, padding: '6px 0' }}>Save</button>
      </div>
      <window.Rule style={{ marginLeft: 20, marginRight: 20, width: 'auto' }} />

      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 20px 40px' }}>
        <div style={{ margin: '18px 0', padding: '14px 16px', background: 'var(--ink)', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <window.KLabel style={{ color: 'rgba(250,247,240,0.6)' }}>My weighted overall</window.KLabel>
            <div className="serif" style={{ fontSize: 12, color: 'rgba(250,247,240,0.5)', fontStyle: 'italic', marginTop: 3 }}>{done ? window.scoreTier(overall) : 'rate all four axes below'}</div>
          </div>
          <div className="num" style={{ fontSize: 38, fontWeight: 600, color: done ? 'var(--paper)' : 'rgba(250,247,240,0.35)', letterSpacing: '-0.02em' }}>{done ? overall.toFixed(1) : '—'}</div>
        </div>

        <window.KLabel style={{ color: 'var(--spot)' }}>Rate each axis</window.KLabel>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, marginTop: 13 }}>
          {window.AXIS_ORDER.map(k => (
            <window.AFAxisSlider key={k} label={window.fmt.axis(k)} value={s[k]}
              onChange={v => setS(prev => ({ ...prev, [k]: v }))} weight={window.AXIS_WEIGHTS[k]} />
          ))}
        </div>

        <window.AFField label="Go again?">
          <div style={{ display: 'flex', gap: 6 }}>
            {[['Yes', true], ['No', false]].map(([l, v]) => (
              <button key={l} type="button" onClick={() => setAgain(v)} className="kl" style={{
                flex: 1, padding: '9px 0', borderRadius: 8, cursor: 'pointer',
                border: `1px solid ${again === v ? (v ? 'var(--green)' : 'var(--ink)') : 'var(--line)'}`,
                background: again === v ? (v ? 'var(--green)' : 'var(--ink)') : 'transparent',
                color: again === v ? 'var(--paper)' : 'var(--ink-2)',
              }}>{l}</button>
            ))}
          </div>
        </window.AFField>

        <div style={{ display: 'flex', gap: 10 }}>
          <window.AFField label="What I spent here" style={{ flex: 1 }}>
            <window.AFInput type="number" inputMode="decimal" min="0" value={spent == null ? '' : spent}
              onChange={e => setSpent(e.target.value === '' ? null : Number(e.target.value))} placeholder="e.g. 120" className="num" />
          </window.AFField>
          <window.AFField label="People in my party" style={{ flex: 1 }}>
            <window.AFInput type="number" inputMode="numeric" min="1" value={people == null ? '' : people}
              onChange={e => setPeople(e.target.value === '' ? null : Math.max(1, Math.round(Number(e.target.value))))} placeholder="e.g. 2" className="num" />
          </window.AFField>
        </div>
        {spent != null && people ? (
          <div style={{ marginTop: 12, display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', background: 'var(--spot-soft)', borderRadius: 12, padding: '11px 14px' }}>
            <span className="kl" style={{ color: 'var(--spot-2)' }}>Price per person</span>
            <span className="num" style={{ fontSize: 18, fontWeight: 600, color: 'var(--spot-2)' }}>{(spent / people).toFixed(2)}</span>
          </div>
        ) : null}

        <window.AFField label="One-line note (optional)">
          <window.AFInput value={note} onChange={e => setNote(e.target.value)} placeholder="What you'd tell the group"
            className="serif" style={{ fontFamily: '"Cormorant Garamond",Georgia,serif' }} />
        </window.AFField>
      </div>
    </div>
  );
}

Object.assign(window, { TableChips, TableMeta, TablesSheet, SharedDetail, SharedPlaceForm, VerdictForm });

<script type="text/babel">
// ── your private journal (Phase 5 behavior, with the table switcher) ──────
// ── "Add to…" sheet: personal lists (toggle) + copy to shared list (7E) ───
// ── batch "Add to…" for multiple selected places (multi-select) ───────────
function BatchAddSheet({ ids, places, org, onClose }) {
  const selPlaces = (places || []).filter(p => ids.includes(p.id));
  const lists = org.lists || [];
  const tables = org.tables || [];
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const [newName, setNewName] = React.useState('');

// ── batch "Add to…" for places selected inside a SHARED LIST ──────────────
// Copies the selected shared-list places into your private journal, and
// optionally into one of your personal lists (creating it if needed).
function BatchAddSharedSheet({ places, org, col, onClose }) {
  const sel = places || [];
  const lists = org.lists || [];
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const [newName, setNewName] = React.useState('');
  const wrap = async (fn, ok) => { setBusy(true); setMsg(null); try { await fn(); if (ok) setMsg(ok); } catch (e) { setMsg((e && e.message) || 'Something went wrong.'); } setBusy(false); };
  // map a shared-list place into a private-journal payload (uses MY verdict if I have one)
  const toPrivate = (sp) => {
    const mine = sp.myReview;
    return {
      name: sp.name, cuisine: sp.cuisine, hood: sp.hood || '', address: sp.address || '',
      price: sp.price || 2, dish: sp.dish || '', tags: sp.tags || [],
      meal: [], occasion: [], photos: sp.photos || [],
      lat: sp.lat == null ? null : sp.lat, lng: sp.lng == null ? null : sp.lng,
      website: sp.website || null,
      status: mine ? 'reviewed' : 'want',
      s: mine ? (mine.s || null) : null,
      overall: (mine && mine.overall != null) ? Number(mine.overall) : null,
      again: mine ? (mine.again == null ? null : mine.again) : null,
      note: mine ? (mine.note || sp.note || '') : (sp.note || ''),
      spent: mine && mine.spent != null ? Number(mine.spent) : null,
      people: mine && mine.people != null ? Number(mine.people) : null,
      date: mine ? window.todayISO() : null,
    };
  };
  const addOne = (sp) => (col.addPlaceAwait ? col.addPlaceAwait(toPrivate(sp)) : Promise.resolve(col.addPlace(toPrivate(sp))));
  const addJournal = () => wrap(async () => { for (const sp of sel) await addOne(sp); }, 'Added ' + sel.length + ' to your journal.');
  const addList = (l) => wrap(async () => { for (const sp of sel) { const id = await addOne(sp); await org.addToList(l.id, id); } }, 'Added ' + sel.length + ' to ' + l.name + '.');
  const create = () => { if (!newName.trim()) return; wrap(async () => { const l = await org.newList(newName.trim()); for (const sp of sel) { const id = await addOne(sp); await org.addToList(l.id, id); } setNewName(''); }, 'List created with ' + sel.length + ' places.'); };
  const rowS = { display: 'flex', alignItems: 'center', gap: 10, background: 'var(--card)', border: '1px solid var(--line)', borderRadius: 12, padding: '11px 13px', width: '100%' };
  return (
    <div className="fl sans" style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)' }}>
      <div style={{ padding: '14px 20px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
        <button onClick={onClose} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--spot)', fontWeight: 600, padding: '6px 0' }}>Done</button>
        <window.KLabel>Add {sel.length} to…</window.KLabel>
        <span style={{ width: 44 }}></span>
      </div>
      <window.Rule style={{ marginLeft: 20, marginRight: 20, width: 'auto' }} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px 32px' }}>
        <div className="serif" style={{ fontSize: 18, fontWeight: 560, color: 'var(--ink)' }}>{sel.length} place{sel.length === 1 ? '' : 's'} selected</div>
        <p className="sans" style={{ fontSize: 12, color: 'var(--ink-3)', lineHeight: 1.5, margin: '5px 0 0', textWrap: 'pretty' }}>Copies them into your own journal — with your verdict if you've given one. A snapshot, not a live link.</p>

        <window.KLabel style={{ marginTop: 18, display: 'block' }}>My journal</window.KLabel>
        <div style={{ ...rowS, marginTop: 9 }}>
          <span className="sans" style={{ flex: 1, fontSize: 14, color: 'var(--ink)' }}>Add all to my journal</span>
          <button onClick={addJournal} disabled={busy} className="kl" style={{ flexShrink: 0, background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 999, padding: '7px 13px', cursor: 'pointer', opacity: busy ? 0.5 : 1 }}>Add all</button>
        </div>

        <window.KLabel style={{ marginTop: 22, display: 'block' }}>Add all to a list</window.KLabel>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 7, marginTop: 9 }}>
          {lists.map(l => (
            <div key={l.id} style={{ ...rowS }}>
              <span className="sans" style={{ flex: 1, fontSize: 14, color: 'var(--ink)' }}>{l.name}</span>
              <span className="num" style={{ fontSize: 11, color: 'var(--ink-3)', marginRight: 4 }}>{(l.placeIds || []).length}</span>
              <button onClick={() => addList(l)} disabled={busy} className="kl" style={{ flexShrink: 0, background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 999, padding: '7px 13px', cursor: 'pointer', opacity: busy ? 0.5 : 1 }}>Add all</button>
            </div>
          ))}
          {!lists.length && <span className="serif" style={{ fontSize: 13.5, fontStyle: 'italic', color: 'var(--ink-3)' }}>No lists yet — make one below.</span>}
        </div>
        <div style={{ display: 'flex', gap: 7, marginTop: 9 }}>
          <window.AFInput value={newName} onChange={e => setNewName(e.target.value)} placeholder="New list name" />
          <button onClick={create} disabled={busy || !newName.trim()} className="kl" style={{ flexShrink: 0, background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 10, padding: '0 16px', cursor: 'pointer', opacity: (busy || !newName.trim()) ? 0.5 : 1 }}>Add</button>
        </div>

        {msg && <div className="sans" style={{ marginTop: 16, padding: '10px 13px', borderRadius: 10, background: 'var(--spot-soft)', color: 'var(--spot-2)', fontSize: 13 }}>{msg}</div>}
      </div>
    </div>
  );
}

        <window.KLabel style={{ marginTop: 18, display: 'block' }}>My Lists</window.KLabel>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 7, marginTop: 9 }}>

        </div>
        <div style={{ display: 'flex', gap: 7, marginTop: 9 }}>
          <window.AFInput value={newName} onChange={e => setNewName(e.target.value)} placeholder="New list name" />
          <button onClick={create} disabled={busy || !newName.trim()} className="kl" style={{ flexShrink: 0, background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 10, padding: '0 16px', cursor: 'pointer', opacity: (busy || !newName.trim()) ? 0.5 : 1 }}>Add</button>

// ── per-table "last seen" map (for the new-activity dot) ──────────────────
function tableSeenMap() {
  try { return JSON.parse(localStorage.getItem('st7-table-seen') || '{}'); } catch (e) { return {}; }
}
function markTableSeen(id) {
  try {
    const m = tableSeenMap();
    m[id] = new Date().toISOString();
    localStorage.setItem('st7-table-seen', JSON.stringify(m));
  } catch (e) {}
}

// ── undo snackbar for soft deletes ────────────────────────────────────────
function UndoBar({ info, onUndo }) {
  if (!info) return null;
  return (
    <div key={info.key} className="fl sans" style={{
      position: 'absolute', left: 16, right: 16, bottom: 14, zIndex: 70,
      maxWidth: 340, margin: '0 auto', background: 'var(--ink)', borderRadius: 12,
      padding: '11px 14px', display: 'flex', alignItems: 'center', gap: 10,
      boxShadow: '0 8px 24px rgba(28,24,21,0.3)',
    }}>
      <span style={{ flex: 1, fontSize: 13, color: 'var(--paper)' }}>
        {info.count === 1 ? 'Place deleted.' : info.count + ' places deleted.'}
      </span>
      <button onClick={onUndo} className="kl" style={{
        flexShrink: 0, background: 'none', border: '1px solid rgba(250,247,240,0.4)',
        borderRadius: 999, padding: '7px 14px', color: 'var(--paper)', cursor: 'pointer',
      }}>Undo</button>
    </div>
  );
}

// ── dismissible, auto-hiding error banner ─────────────────────────────────
function ErrorBanner({ message }) {
  const [hidden, setHidden] = React.useState(false);
  React.useEffect(() => {
    setHidden(false);
    if (!message) return;
    const t = setTimeout(() => setHidden(true), 8000);
    return () => clearTimeout(t);
  }, [message]);
  if (!message || hidden) return null;
  return (
    <div className="sans" role="alert" style={{
      position: 'fixed', top: 10, left: '50%', transform: 'translateX(-50%)', zIndex: 100,
      background: '#9C3416', color: '#FAF7F0', padding: '9px 12px 9px 16px', borderRadius: 10,
      fontSize: 13, maxWidth: 360, boxShadow: '0 4px 16px rgba(0,0,0,0.2)',
      display: 'flex', alignItems: 'center', gap: 10,
    }}>
      <span style={{ minWidth: 0 }}>{message}</span>
      <button onClick={() => setHidden(true)} aria-label="Dismiss error" style={{
        flexShrink: 0, background: 'none', border: 'none', color: 'rgba(250,247,240,0.85)',
        fontSize: 16, lineHeight: 1, cursor: 'pointer', padding: 0,
      }}>×</button>
    </div>
  );
}

function JournalSpace({ user, col, switcher, onSettings, onChrome, org, listFilter, title, onExit, openId, onConsumed, openLog, onConsumedLog, onTour, resume, onResume, onDismissResume }) {
  const [view, setView] = React.useState({ screen: 'pipeline', placeId: null, forceStatus: null });
  const go = (screen, extra) => setView({ screen, placeId: null, forceStatus: null, ...(extra || {}) });
  React.useEffect(() => { onChrome && onChrome(view.screen === 'pipeline' || view.screen === 'detail'); }, [view.screen]);
  React.useEffect(() => { if (openId) { setView({ screen: 'detail', placeId: openId, forceStatus: null }); onConsumed && onConsumed(); } }, [openId]);
  React.useEffect(() => { if (openLog) { go(window.GMAPS_KEY ? 'search' : 'form'); onConsumedLog && onConsumedLog(); } }, [openLog]);

  const place = view.placeId ? col.places.find(p => p.id === view.placeId) : null;
  const visible = listFilter ? col.places.filter(p => (listFilter.placeIds || []).includes(p.id)) : col.places;

  const reviewed = col.places.filter(p => p.s);
  const avgScores = reviewed.length >= 2 ? {
    food: reviewed.reduce((a, p) => a + p.s.food, 0) / reviewed.length,
    value: reviewed.reduce((a, p) => a + p.s.value, 0) / reviewed.length,
    vibe: reviewed.reduce((a, p) => a + p.s.vibe, 0) / reviewed.length,
    service: reviewed.reduce((a, p) => a + p.s.service, 0) / reviewed.length,
  } : null;

  if (view.screen === 'search') {
    return (
      <window.LiveSearch
        onPick={(prefill) => setView({ screen: 'form', placeId: null, forceStatus: null, prefill })}
        onManual={() => go('form')}
        onClose={() => go('pipeline')} />
    );
  }
  if (view.screen === 'form') {
    return (
      <window.AppForm
        place={place}
        forceStatus={view.forceStatus}
        prefill={view.prefill}
        onSave={(data) => {
          if (place) { col.updatePlace(place.id, data); go('detail', { placeId: place.id }); }
          else { const id = col.addPlace(data); go('detail', { placeId: id }); }
        }}
        onCancel={() => place ? go('detail', { placeId: place.id }) : go('pipeline')} />
    );
  }
  if (view.screen === 'organize' && place && org) {
    return <AddToSheet place={place} org={org} onClose={() => go('detail', { placeId: place.id })} />;
  }
  if (view.screen === 'batch' && org) {
    return <BatchAddSheet ids={view.ids || []} places={col.places} org={org} onClose={() => go('pipeline')} />;
  }
  if (view.screen === 'detail' && place) {
    return (
      <window.AppDetail
        place={place}
        avgScores={avgScores}
        onBack={() => go('pipeline')}
        onEdit={() => go('form', { placeId: place.id })}
        onReview={() => go('form', { placeId: place.id, forceStatus: 'reviewed' })}
        onAddTo={org ? () => go('organize', { placeId: place.id }) : null}
        onRemoveFromList={listFilter ? () => { org.removeFromList(listFilter.id, place.id); go('pipeline'); } : null}
        onToggleFav={() => col.updatePlace(place.id, { fav: !place.fav })}
        onDelete={() => { col.deletePlace(place.id); go('pipeline'); }} />
    );
  }
  const resumeBar = (!listFilter && resume && resume.label) ? (
    <div style={{ padding: '0 20px 12px', flexShrink: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'var(--spot-soft)', border: '1px solid rgba(194,69,30,0.28)', borderRadius: 12, padding: '9px 11px 9px 13px' }}>
        <button onClick={() => onResume && onResume(resume)} className="sans" style={{ flex: 1, minWidth: 0, textAlign: 'left', background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
          <div className="kl" style={{ color: 'var(--spot-2)', fontSize: 8.5 }}>Continue where you left off</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginTop: 2 }}>
            <span style={{ color: 'var(--spot)', fontSize: 13 }}>↩</span>
            <span className="serif" style={{ fontSize: 16, fontWeight: 560, color: 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{resume.label}</span>
          </div>
        </button>
        {onDismissResume && (
          <button onClick={onDismissResume} aria-label="Dismiss" style={{ flexShrink: 0, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', fontSize: 17, lineHeight: 1, padding: '2px 4px' }}>×</button>
        )}
      </div>
    </div>
  ) : null;
  const head = listFilter ? (
    <div style={{ padding: '0 20px 10px', flexShrink: 0 }}>
      <button onClick={onExit} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-2)', padding: '2px 0' }}>‹ My Lists</button>
    </div>
  ) : (resumeBar || switcher);
  return (
    <window.AppPipeline
      places={visible}
      switcher={head}
      title={title}
      hideLog={!!listFilter}
      onOpenPlace={(id) => go('detail', { placeId: id })}
      onLog={() => go(window.GMAPS_KEY ? 'search' : 'form')}
      onBatchOrganize={org ? (ids) => go('batch', { ids }) : null}
      onBatchDelete={(ids) => col.deletePlaces(ids || [])}
      onToggleFav={(id) => { const pl = (col.places || []).find(x => x.id === id); col.updatePlace(id, { fav: !(pl && pl.fav) }); }}
      onTour={onTour}
      onSettings={onSettings} />
  );
}

// ── a shared list: group list + verdicts ─────────────────────────────────
function TableSpace({ user, tableId, switcher, onSettings, onChrome, col, org, openPlaceId, onConsumedPlace, onNavigate }) {
  const tbl = window.useSharedTable(tableId, user);
  const [view, setView] = React.useState(() => openPlaceId
    ? { screen: 'detail', placeId: openPlaceId, prefill: null }
    : { screen: 'pipeline', placeId: null, prefill: null });
  const go = (screen, extra) => setView({ screen, placeId: null, prefill: null, ...(extra || {}) });

  // deep-link from the map's "Go to Review": open this place's detail
  React.useEffect(() => {
    if (openPlaceId) { setView({ screen: 'detail', placeId: openPlaceId, prefill: null }); onConsumedPlace && onConsumedPlace(); }
  }, [openPlaceId]);

  // report where we are (table + open place, if any) for "Continue where you left off"
  React.useEffect(() => {
    if (!onNavigate) return;
    const data = tbl.data;
    const tName = (data && data.table) ? data.table.name : 'List';
    let label = '“' + tName + '”', placeId = null;
    if (view.screen === 'detail' && view.placeId && data) {
      const pl = (data.places || []).find(p => p.id === view.placeId);
      if (pl) { placeId = pl.id; label = '“' + pl.name + '” · ' + tName; }
    }
    onNavigate({ tab: 'tables', kind: 'table', id: tableId, placeId, label });
  }, [view.screen, view.placeId, tbl.data]);

  // Copy a shared-table place into my private journal. Uses MY verdict (not the
  // table average) when I've reviewed it; otherwise it lands as "want to try".
  const addToPrivate = (sp) => {
    if (!sp || !col) return;
    const mine = sp.myReview;
    col.addPlace({
      name: sp.name, cuisine: sp.cuisine, hood: sp.hood || '', address: sp.address || '',
      price: sp.price || 2, dish: sp.dish || '', tags: sp.tags || [],
      meal: [], occasion: [], photos: sp.photos || [],
      lat: sp.lat == null ? null : sp.lat, lng: sp.lng == null ? null : sp.lng,
      website: sp.website || null,
      status: mine ? 'reviewed' : 'want',
      s: mine ? (mine.s || null) : null,
      overall: (mine && mine.overall != null) ? Number(mine.overall) : null,
      again: mine ? (mine.again == null ? null : mine.again) : null,
      note: mine ? (mine.note || sp.note || '') : (sp.note || ''),
      spent: mine && mine.spent != null ? Number(mine.spent) : null,
      people: mine && mine.people != null ? Number(mine.people) : null,
      date: mine ? window.todayISO() : null,
    });
  };
  React.useEffect(() => { onChrome && onChrome(view.screen === 'pipeline' || view.screen === 'detail'); }, [view.screen]);

  if (!tbl.data) {
    return tbl.err
      ? <window.CloudError message={tbl.err} onRetry={() => tbl.refetch()} onSignOut={() => window.sb.auth.signOut()} />
      : <window.CloudLoading text="Pulling up chairs…" />;
  }

  const place = view.placeId ? tbl.data.places.find(p => p.id === view.placeId) : null;

  let body;
  if (view.screen === 'search') {
    body = (
      <window.LiveSearch
        onPick={(prefill) => setView({ screen: 'form', placeId: null, prefill })}
        onManual={() => go('form')}
        onClose={() => go('pipeline')} />
    );
  } else if (view.screen === 'form') {
    body = (
      <window.SharedPlaceForm
        place={place}
        prefill={view.prefill}
        onSave={(d) => {
          if (place) { tbl.updatePlace(place.id, d); go('detail', { placeId: place.id }); }
          else { tbl.addPlace(d); go('pipeline'); }
        }}
        onCancel={() => place ? go('detail', { placeId: place.id }) : go('pipeline')} />
    );
  } else if (view.screen === 'verdict' && place) {
    body = (
      <window.VerdictForm
        place={place}
        onSave={(v) => { tbl.saveVerdict(place.id, v); go('detail', { placeId: place.id }); }}
        onCancel={() => go('detail', { placeId: place.id })} />
    );
  } else if (view.screen === 'batch' && org && col) {
    const picked = (tbl.data.places || []).filter(p => (view.ids || []).includes(p.id));
    body = <BatchAddSharedSheet places={picked} org={org} col={col} onClose={() => go('pipeline')} />;
  } else if (view.screen === 'detail' && place) {
    body = (
      <window.SharedDetail
        p={place}
        onBack={() => go('pipeline')}
        onEdit={() => go('form', { placeId: place.id })}
        onVerdict={() => go('verdict', { placeId: place.id })}
        onVisited={() => tbl.markVisited(place.id)}
        onAddToMine={col ? () => addToPrivate(place) : null}
        onToggleFav={() => tbl.toggleFav(place.id)}
        onDelete={() => { tbl.deletePlace(place.id); go('pipeline'); }} />
    );
  } else {
    body = (
      <window.AppPipeline
        places={tbl.data.places}
        title={tbl.data.table.name}
        switcher={
          <React.Fragment>
            {switcher}
            <window.TableMeta table={tbl.data.table} members={tbl.data.members} />
          </React.Fragment>
        }
        onOpenPlace={(id) => go('detail', { placeId: id })}
        onLog={() => go(window.GMAPS_KEY ? 'search' : 'form')}
        onBatchOrganize={(org && col) ? (ids) => go('batch', { ids }) : null}
        onBatchDelete={(ids) => tbl.deletePlaces(ids || [])}
        onToggleFav={(id) => tbl.toggleFav(id)}
        onSettings={onSettings} />
    );
  }

  return (
    <div style={{ height: '100%', position: 'relative' }}>
      <ErrorBanner message={tbl.err} />
      {body}
      <UndoBar info={tbl.undo} onUndo={tbl.undoDelete} />
    </div>
  );
}

function TablesTab({ user, col, tables, lists, org, refreshTables, onChrome, onOpenAccount, openTableId, onConsumedTable, openTablePlaceId, onConsumedTablePlace, openListId, onConsumedList, onNavigate, freshIds, onSeen }) {
  const [space, setSpace] = React.useState(null);
  const [spacePlace, setSpacePlace] = React.useState(null); // deep-link to a place inside the table
  const [listId, setListId] = React.useState(null);
  const [sheet, setSheet] = React.useState(false);
  React.useEffect(() => {
    if (openTableId) {
      setSpace(openTableId);
      setSpacePlace(openTablePlaceId || null);
      onConsumedTable && onConsumedTable();
      onConsumedTablePlace && onConsumedTablePlace();
    }
  }, [openTableId]);
  React.useEffect(() => { if (openListId) { setListId(openListId); onConsumedList && onConsumedList(); } }, [openListId]);
  // report the current location up so "Continue where you left off" can return.
  // When a shared table is open, TableSpace reports it (incl. the open place).
  React.useEffect(() => {
    if (!onNavigate || space) return;
    if (listId) {
      const l = (lists || []).find(x => x.id === listId);
      const name = l ? l.name : 'List';
      onNavigate({ tab: 'tables', kind: 'list', id: listId, label: '“' + name + '”' });
    } else {
      onNavigate({ tab: 'tables', kind: 'home', label: 'Lists' });
    }
  }, [space, listId, tables, lists]);
  // mark a table seen when opening it, and again when leaving it
  // (so your own additions while inside don't show up as "new" later)
  const prevSpace = React.useRef(null);
  React.useEffect(() => {
    if (space) { onSeen && onSeen(space); prevSpace.current = space; }
    else if (prevSpace.current) { onSeen && onSeen(prevSpace.current); prevSpace.current = null; }
  }, [space]);
  React.useEffect(() => {
    if (sheet) { onChrome && onChrome(false); }
    else if (!space && !listId) { onChrome && onChrome(true); }
    // when a table or list is open, the inner screen manages the chrome
  }, [sheet, space, listId]);

  if (sheet) {
    return (
      <window.TablesSheet
        tables={tables}
        onCreate={async (name) => { const t = await window.socialApi.createTable(name); await refreshTables(); setSheet(false); setSpace(t.id); }}
        onJoin={async (code) => { const r = await window.socialApi.joinTable(code); await refreshTables(); setSheet(false); setSpace(r.id); }}
        onLeave={async (id) => { await window.socialApi.leaveTable(id, user.id); await refreshTables(); if (space === id) setSpace(null); }}
        onClose={() => setSheet(false)} />
    );
  }
  if (listId) {
    const list = (lists || []).find(l => l.id === listId);
    if (!list) { return <TablesHome uid={user.id} lists={lists} tables={tables} freshIds={freshIds} onOpen={(id) => setSpace(id)} onManage={() => setSheet(true)} onOpenList={(id) => setListId(id)} onNewList={(n) => org.newList(n)} onDeleteList={(id) => org.deleteList(id)} onSetListPublic={(id, pub) => org.setListPublic(id, pub)} onDeleteTable={(id) => org.deleteTable(id)} onLeaveTable={(id) => org.leaveTable(id)} />; }
    return (
      <JournalSpace key={listId} user={user} col={col} org={org}
        listFilter={list} title={list.name}
        onChrome={onChrome} onExit={() => { setListId(null); onChrome && onChrome(true); }} />
    );
  }
  if (space) {
    return (
      <TableSpace key={space} user={user} tableId={space} col={col} org={org} onChrome={onChrome} onSettings={onOpenAccount}
        openPlaceId={spacePlace} onConsumedPlace={() => setSpacePlace(null)} onNavigate={onNavigate}
        switcher={
          <div style={{ padding: '0 20px 10px', flexShrink: 0 }}>
            <button onClick={() => { setSpace(null); onChrome && onChrome(true); }} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-2)', padding: '2px 0' }}>‹ All lists</button>
          </div>
        } />
    );
  }
  return (
    <TablesHome
      uid={user.id} lists={lists} tables={tables} freshIds={freshIds}
      onOpen={(id) => setSpace(id)} onManage={() => setSheet(true)}
      onOpenList={(id) => setListId(id)}
      onNewList={(n) => org.newList(n)}
      onDeleteList={(id) => org.deleteList(id)}
      onSetListPublic={(id, pub) => org.setListPublic(id, pub)}
      onDeleteTable={(id) => org.deleteTable(id)}
      onLeaveTable={(id) => org.leaveTable(id)} />
  );
}

// ── Google Maps JS loader + map helpers (Phase 7F) ────────────────────────
window.loadGoogleMaps = function () {
  if (window.__gmapsPromise) return window.__gmapsPromise;
  window.__gmapsPromise = new Promise((resolve, reject) => {
    if (window.google && window.google.maps) return resolve(window.google.maps);
    if (!window.GMAPS_KEY) return reject(new Error('No Google Maps key configured.'));
    window.__gmapsCb = () => resolve(window.google.maps);
    const sc = document.createElement('script');
    sc.src = 'https://maps.googleapis.com/maps/api/js?key=' + window.GMAPS_KEY + '&v=weekly&callback=__gmapsCb';
    sc.async = true;
    sc.onerror = () => reject(new Error('Could not load Google Maps — check the Maps JavaScript API is enabled for your key.'));
    document.head.appendChild(sc);
    setTimeout(() => { if (!(window.google && window.google.maps)) reject(new Error('Google Maps timed out — is the Maps JavaScript API enabled and billing on?')); }, 12000);
  });
  return window.__gmapsPromise;
};
