function flPinIcon(maps, p) {
  // Rated place → show the score in the pin, coloured by verdict:
  // green = would go again, red = pass, neutral = rated but no verdict yet.
  if (p.overall != null) {
    const fill = p.again === true ? '#3E6B4F' : (p.again === false ? '#C2451E' : '#5B544B');
    const label = Number(p.overall).toFixed(1);
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="48" viewBox="0 0 40 48">'
      + '<path d="M20 1.5C10 1.5 2.5 9 2.5 18.5 2.5 31 20 46.5 20 46.5S37.5 31 37.5 18.5C37.5 9 30 1.5 20 1.5z" fill="' + fill + '" stroke="#FAF7F0" stroke-width="2.5"/>'
      + '<text x="20" y="23.5" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="13.5" font-weight="700" fill="#FFFFFF">' + label + '</text></svg>';
    return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), scaledSize: new maps.Size(40, 48), anchor: new maps.Point(20, 46) };
  }
  // Unrated place → keep the small cuisine-coloured dot pin.
  const color = (window.CUISINE_META[p.cuisine] && window.CUISINE_META[p.cuisine].dot) || '#C2451E';
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38" viewBox="0 0 30 38">'
    + '<path d="M15 1C7.8 1 2 6.6 2 13.6 2 23 15 37 15 37s13-14 13-23.4C28 6.6 22.2 1 15 1z" fill="' + color + '" stroke="#FAF7F0" stroke-width="2"/>'
    + '<circle cx="15" cy="13.5" r="4.6" fill="#FAF7F0"/></svg>';
  return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), scaledSize: new maps.Size(30, 38), anchor: new maps.Point(15, 37) };
}

// "you are here" blue dot, centred on the user's position
function meDotIcon(maps) {
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">'
    + '<circle cx="11" cy="11" r="9" fill="#4285F4" fill-opacity="0.18"/>'
    + '<circle cx="11" cy="11" r="5" fill="#4285F4" stroke="#FFFFFF" stroke-width="2.5"/></svg>';
  return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), scaledSize: new maps.Size(22, 22), anchor: new maps.Point(11, 11) };
}

function flInfoHtml(p) {
  const ov = (p.overall != null) ? Number(p.overall).toFixed(1) : '—';
  const price = '$'.repeat(p.price || 0);
  const again = p.again === true ? 'Go again' : (p.again === false ? 'Skip next time' : '');
  return '<div style="font-family:\'Hanken Grotesk\',system-ui,sans-serif;min-width:150px;max-width:230px;padding:2px 2px 4px;">'
    + '<div style="font-family:\'Cormorant Garamond\',Georgia,serif;font-size:19px;font-weight:600;color:#1C1815;line-height:1.1;">' + flEsc(p.name) + '</div>'
    + '<div style="font-size:10.5px;color:#938B7E;text-transform:uppercase;letter-spacing:0.09em;margin-top:3px;">' + flEsc(p.cuisine) + (p.hood ? ' &middot; ' + flEsc(p.hood) : '') + '</div>'
    + '<div style="display:flex;gap:10px;align-items:baseline;margin-top:6px;">'
    + '<span style="font-size:21px;font-weight:600;color:#C2451E;letter-spacing:-0.02em;">' + ov + '</span>'
    + (price ? '<span style="font-size:12px;color:#5B544B;">' + price + '</span>' : '')
    + (again ? '<span style="font-size:11px;color:#3E6B4F;">' + again + '</span>' : '')
    + '</div>'
    + (p.dish ? '<div style="font-size:12px;color:#5B544B;margin-top:5px;font-style:italic;">Order: ' + flEsc(p.dish) + '</div>' : '')
    + '</div>';
}

function MapFilterSelect({ value, onChange, options }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)} className="kl" style={{
      appearance: 'none', WebkitAppearance: 'none', flexShrink: 0, cursor: 'pointer',
      border: '1px solid var(--line)', borderRadius: 999, background: 'var(--card)',
      color: 'var(--ink-2)', padding: '7px 13px', fontSize: 9,
    }}>
      {options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  );
}

function MapTab({ user, places, lists, tables, onOpenPlace, onOpenTable }) {
  const personal = (places || []).filter(p => p.lat != null && p.lng != null).map(p => ({ ...p, kind: 'personal' }));
  const [shared, setShared] = React.useState([]);
  const [filterVal, setFilterVal] = React.useState('all');
  const [cuisine, setCuisine] = React.useState('all');
  const [price, setPrice] = React.useState('all');
  const [again, setAgain] = React.useState('all');
  const [favOnly, setFavOnly] = React.useState(false);
  const [statuses, setStatuses] = React.useState({ want: true, visited: true, reviewed: true });
  const [q, setQ] = React.useState('');
  const [state, setState] = React.useState('loading');
  const [errMsg, setErrMsg] = React.useState(null);
  const [selected, setSelected] = React.useState(null);
  const [help, setHelp] = React.useState(false);
  const [myLoc, setMyLoc] = React.useState(null);   // { lat, lng } once located
  const [locating, setLocating] = React.useState(false);
  const [locErr, setLocErr] = React.useState(null);
  const mapEl = React.useRef(null);
  const mapObj = React.useRef(null);
  const markers = React.useRef([]);
  const meMarker = React.useRef(null);              // the "you are here" dot

  React.useEffect(() => {
    let alive = true;
    window.socialApi.fetchMapData(user.id).then(d => { if (alive) setShared(d); }).catch(() => {});
    return () => { alive = false; };
  }, [user.id]);

  const all = personal.concat(shared);
  const cuisineOpts = React.useMemo(() => [...new Set(all.map(p => p.cuisine).filter(Boolean))].sort(), [places, shared]);

  const matches = (e) => {
    if (filterVal !== 'all') {
      if (filterVal.indexOf('list:') === 0) {
        const id = filterVal.slice(5); const l = (lists || []).find(x => x.id === id);
        if (!(e.kind === 'personal' && l && (l.placeIds || []).includes(e.id))) return false;
      } else if (filterVal.indexOf('table:') === 0) {
        const id = filterVal.slice(6);
        if (!(e.kind === 'shared' && e.tableId === id)) return false;
      }
    }
    if (!statuses[e.status || 'want']) return false;
    if (cuisine !== 'all' && e.cuisine !== cuisine) return false;
    if (price !== 'all' && e.price !== Number(price)) return false;
    if (again === 'yes' && e.again !== true) return false;
    if (again === 'no' && e.again !== false) return false;
    if (favOnly && !e.fav) return false;
    if (q.trim() && (e.name || '').toLowerCase().indexOf(q.trim().toLowerCase()) < 0) return false;
    return true;
  };
  const filtered = all.filter(matches);

  const groups = React.useMemo(() => {
    const m = new Map();
    filtered.forEach(e => {
      const key = Number(e.lat).toFixed(5) + ',' + Number(e.lng).toFixed(5);
      if (!m.has(key)) m.set(key, { key, lat: Number(e.lat), lng: Number(e.lng), entries: [] });
      m.get(key).entries.push(e);
    });
    return [...m.values()];
  }, [filtered.map(e => e.kind + e.id).join('|')]);

  React.useEffect(() => { setSelected(null); }, [filterVal, cuisine, price, again, favOnly, q, statuses]);

  React.useEffect(() => {
    if (!all.length) { setState('empty'); return; }
    if (mapObj.current) return;
    let alive = true;
    window.loadGoogleMaps().then(maps => {
      if (!alive || !mapEl.current) return;
      mapObj.current = new maps.Map(mapEl.current, {
        center: { lat: 37.7749, lng: -122.4194 }, zoom: 11,
        mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
        clickableIcons: false, styles: MAP_STYLE,
      });
      setState('ready');
    }).catch(e => { if (alive) { setState('error'); setErrMsg(e.message); } });
    return () => { alive = false; };
  }, [all.length === 0]);

  React.useEffect(() => {
    if (state !== 'ready' || !mapObj.current || !window.google) return;
    const maps = window.google.maps;
    markers.current.forEach(m => m.setMap(null));
    markers.current = [];
    const bounds = new maps.LatLngBounds();
    groups.forEach(g => {
      const pos = { lat: g.lat, lng: g.lng };
      const m = new maps.Marker({ position: pos, map: mapObj.current, title: g.entries[0].name, icon: flPinIcon(maps, g.entries[0]) });
      m.addListener('click', () => setSelected({ key: g.key, entries: g.entries, idx: 0 }));
      markers.current.push(m);
      bounds.extend(pos);
    });
    if (groups.length === 1) { mapObj.current.setCenter(bounds.getCenter()); mapObj.current.setZoom(15); }
    else if (groups.length > 1) { mapObj.current.fitBounds(bounds, 56); }
  }, [state, groups]);

  // ── show my location ─────────────────────────────────────────────────────
  // Asks the browser for the device's position (needs HTTPS + user permission).
  const locateMe = () => {
    if (!navigator.geolocation) { setLocErr('This device can’t share its location.'); return; }
    setLocating(true); setLocErr(null);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        setMyLoc(loc);
        setLocating(false);
        if (mapObj.current) { mapObj.current.panTo(loc); mapObj.current.setZoom(15); }
      },
      (err) => {
        setLocating(false);
        setLocErr(err && err.code === 1
          ? 'Location blocked — allow location access for this site, then try again.'
          : 'Couldn’t get your location. Try again.');
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
    );
  };

  // keep the "you are here" dot in sync with myLoc once the map is ready
  React.useEffect(() => {
    if (state !== 'ready' || !mapObj.current || !window.google) return;
    const maps = window.google.maps;
    if (!myLoc) {
      if (meMarker.current) { meMarker.current.setMap(null); meMarker.current = null; }
      return;
    }
    if (!meMarker.current) {
      meMarker.current = new maps.Marker({ map: mapObj.current, title: 'You are here', icon: meDotIcon(maps), zIndex: 9999, clickable: false });
    }
    meMarker.current.setPosition(myLoc);
  }, [state, myLoc]);

  const jumpNearby = (lat, lng) => { if (mapObj.current) { mapObj.current.panTo({ lat, lng }); mapObj.current.setZoom(16); } };
  // a stable nearest-neighbour route through every visible pin (no oscillation)
  const route = React.useMemo(() => {
    if (groups.length <= 1) return groups.map(g => g.key);
    const remaining = groups.slice();
    const order = [remaining.shift()];
    while (remaining.length) {
      const last = order[order.length - 1];
      let bi = 0, bd = Infinity;
      remaining.forEach((g, i) => {
        const d = (g.lat - last.lat) * (g.lat - last.lat) + (g.lng - last.lng) * (g.lng - last.lng);
        if (d < bd) { bd = d; bi = i; }
      });
      order.push(remaining.splice(bi, 1)[0]);
    }
    return order.map(g => g.key);
  }, [groups]);

  const nextNearby = () => {
    if (!selected || groups.length < 2) return;
    const i = route.indexOf(selected.key);
    const nextKey = route[(i + 1) % route.length];
    const g = groups.find(x => x.key === nextKey);
    if (g) { setSelected({ key: g.key, entries: g.entries, idx: 0 }); jumpNearby(g.lat, g.lng); }
  };

  const filterOpts = [{ v: 'all', l: 'All places' }]
    .concat((lists || []).map(l => ({ v: 'list:' + l.id, l: '◾ ' + l.name })))
    .concat((tables || []).map(t => ({ v: 'table:' + t.id, l: '◆ ' + t.name })));
  const cuisineSel = [{ v: 'all', l: 'All cuisines' }].concat(cuisineOpts.map(c => ({ v: c, l: c })));
  const priceOpts = [{ v: 'all', l: 'Any $' }, { v: '1', l: '$' }, { v: '2', l: '$$' }, { v: '3', l: '$$$' }, { v: '4', l: '$$$$' }];
  const againOpts = [{ v: 'all', l: 'Go again?' }, { v: 'yes', l: 'Go again ✓' }, { v: 'no', l: 'Skip' }];

  const c = selected ? selected.entries[selected.idx] : null;

  return (
    <div className="fl sans" style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)' }}>
      <div style={{ padding: '14px 16px 10px', flexShrink: 0, display: 'flex', alignItems: 'center', gap: 8 }}>
        <div className="serif" style={{ fontSize: 24, fontWeight: 560, color: 'var(--ink)', flexShrink: 0 }}>Map</div>
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search the map" className="sans" style={{
          flex: 1, minWidth: 0, border: '1px solid var(--line)', borderRadius: 999, padding: '8px 13px',
          background: 'var(--card)', color: 'var(--ink)', fontSize: 13, outline: 'none',
        }} />
        <button onClick={locateMe} disabled={locating} aria-label="Show my location" aria-pressed={!!myLoc} title="Show my location" className="kl" style={{
          flexShrink: 0, width: 32, height: 32, borderRadius: 999,
          border: '1px solid ' + (myLoc ? '#4285F4' : 'var(--line)'),
          background: myLoc ? '#4285F4' : 'transparent', cursor: locating ? 'default' : 'pointer',
          color: myLoc ? '#FFFFFF' : 'var(--ink-2)', fontSize: 15, opacity: locating ? 0.6 : 1,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>{locating ? '…' : '◎'}</button>
        <button onClick={() => setHelp(true)} aria-label="Map help" className="kl" style={{
          flexShrink: 0, width: 32, height: 32, borderRadius: 999, border: '1px solid var(--line)',
          background: 'transparent', cursor: 'pointer', color: 'var(--ink-2)', fontSize: 13,
        }}>?</button>
      </div>
      {locErr && (
        <div className="sans" style={{ margin: '0 16px 8px', padding: '8px 12px', borderRadius: 10, background: 'var(--spot-soft)', color: 'var(--spot-2)', fontSize: 12.5, lineHeight: 1.45 }}>{locErr}</div>
      )}

      <div style={{ display: 'flex', gap: 6, padding: '0 16px 10px', overflowX: 'auto', flexShrink: 0, alignItems: 'center' }}>
        <MapFilterSelect value={filterVal} onChange={setFilterVal} options={filterOpts} />
        <MapFilterSelect value={cuisine} onChange={setCuisine} options={cuisineSel} />
        <MapFilterSelect value={price} onChange={setPrice} options={priceOpts} />
        <MapFilterSelect value={again} onChange={setAgain} options={againOpts} />
        <button onClick={() => setFavOnly(v => !v)} className="kl" aria-pressed={favOnly} title="Show favourites only" style={{
          flexShrink: 0, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4,
          border: '1px solid ' + (favOnly ? 'var(--spot)' : 'var(--line)'), borderRadius: 999,
          background: favOnly ? 'var(--spot)' : 'var(--card)',
          color: favOnly ? 'var(--paper)' : 'var(--ink-2)', padding: '7px 12px', fontSize: 9,
        }}>{favOnly ? '★' : '☆'} Favourites</button>
        <span className="kl" style={{ color: 'var(--ink-3)', flexShrink: 0, paddingLeft: 4 }}>{groups.length}</span>
      </div>

      <div style={{ display: 'flex', gap: 6, padding: '0 16px 10px', overflowX: 'auto', flexShrink: 0, alignItems: 'center' }}>
        <span className="kl" style={{ color: 'var(--ink-3)', flexShrink: 0, fontSize: 9, paddingRight: 2 }}>Show</span>
        {[['want', 'Want'], ['visited', 'Visited'], ['reviewed', 'Reviewed']].map(([k, l]) => {
          const on = statuses[k];
          return (
            <button key={k} type="button" onClick={() => setStatuses(s => ({ ...s, [k]: !s[k] }))} aria-pressed={on} title={(on ? 'Hide ' : 'Show ') + l} className="kl" style={{
              flexShrink: 0, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 5,
              border: '1px solid ' + (on ? 'var(--ink)' : 'var(--line)'), borderRadius: 999,
              background: on ? 'var(--ink)' : 'var(--card)',
              color: on ? 'var(--paper)' : 'var(--ink-3)', padding: '7px 12px', fontSize: 9,
              opacity: on ? 1 : 0.55,
            }}>
              <window.StatusDot status={k} size={8} /> {l}
            </button>
          );
        })}
      </div>

      <div style={{ flex: 1, minHeight: 0, position: 'relative', borderTop: '1px solid var(--line)' }}>
        <div ref={mapEl} style={{ position: 'absolute', inset: 0 }} />
        {state === 'loading' && (<div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--paper-2)' }}><span className="serif" style={{ fontSize: 15, fontStyle: 'italic', color: 'var(--ink-3)' }}>Unfolding the map…</span></div>)}
        {state === 'empty' && (<div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px 30px', textAlign: 'center', background: 'var(--paper-2)' }}><div style={{ maxWidth: 300 }}><div className="serif" style={{ fontSize: 18, fontStyle: 'italic', color: 'var(--ink-2)', lineHeight: 1.5 }}>No mapped places yet.</div><p className="sans" style={{ fontSize: 13, color: 'var(--ink-3)', lineHeight: 1.6, marginTop: 10 }}>Pins come only from places added with the <strong>Google search</strong> option in Log. Tap the ? above for a quick guide.</p></div></div>)}
        {state === 'error' && (<div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px 30px', textAlign: 'center', background: 'var(--paper-2)' }}><div style={{ maxWidth: 300 }}><div className="serif" style={{ fontSize: 17, fontStyle: 'italic', color: 'var(--spot-2)', lineHeight: 1.5 }}>The map could not load.</div><p className="sans" style={{ fontSize: 12.5, color: 'var(--ink-3)', lineHeight: 1.6, marginTop: 10 }}>{errMsg}</p></div></div>)}

        {c && (
          <div style={{ position: 'absolute', left: 12, right: 12, bottom: 12, background: 'var(--card)', border: '1px solid var(--line)', borderRadius: 16, boxShadow: '0 8px 30px rgba(28,24,21,0.18)', overflow: 'hidden' }}>
            {selected.entries.length > 1 && (
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, padding: '8px 12px', background: 'var(--spot-soft)' }}>
                <span className="kl" style={{ color: 'var(--spot-2)' }}>{selected.entries.length} reviews here · {selected.idx + 1} of {selected.entries.length}</span>
                <span style={{ display: 'flex', gap: 4 }}>
                  <button onClick={() => setSelected(s0 => ({ ...s0, idx: (s0.idx - 1 + s0.entries.length) % s0.entries.length }))} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--spot-2)', fontSize: 15, padding: '0 4px' }}>‹</button>
                  <button onClick={() => setSelected(s0 => ({ ...s0, idx: (s0.idx + 1) % s0.entries.length }))} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--spot-2)', fontSize: 15, padding: '0 4px' }}>›</button>
                </span>
              </div>
            )}
            <div style={{ display: 'flex' }}>
              {(c.photos && c.photos[0]) && (
                <div onClick={() => window.openPhoto(c.photos[0])} style={{ width: 92, flexShrink: 0, alignSelf: 'stretch', cursor: 'zoom-in', backgroundImage: 'url(' + c.photos[0] + ')', backgroundSize: 'cover', backgroundPosition: 'center' }} />
              )}
              <div style={{ flex: 1, minWidth: 0, padding: '12px 12px 10px 14px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
                  <div className="serif" style={{ fontSize: 18, fontWeight: 580, color: 'var(--ink)', lineHeight: 1.1 }}>{c.name}</div>
                  <button onClick={() => setSelected(null)} aria-label="Close" style={{ flexShrink: 0, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', fontSize: 18, lineHeight: 1, padding: 0 }}>×</button>
                </div>
                <div className="kl" style={{ color: 'var(--ink-3)', marginTop: 4 }}>{c.cuisine}{c.hood ? ' · ' + c.hood : ''}{c.kind === 'shared' ? ' · ' + c.tableName : ''}</div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginTop: 6 }}>
                  {c.overall != null && <span className="num" style={{ fontSize: 20, fontWeight: 600, color: 'var(--spot)' }}>{Number(c.overall).toFixed(1)}</span>}
                  <span className="num" style={{ fontSize: 12, color: 'var(--ink-2)' }}>{'$'.repeat(c.price || 0)}</span>
                  {c.again === true && <span className="kl" style={{ color: 'var(--green)' }}>Go again</span>}
                </div>
                {window.openStatus(c.hours) ? (
                  <div style={{ marginTop: 5 }}><window.OpenBadge hours={c.hours} /></div>
                ) : null}
              </div>
              {groups.length > 1 && (
                <button onClick={nextNearby} aria-label="Next nearby place" style={{ flexShrink: 0, width: 40, alignSelf: 'stretch', background: 'var(--paper-2)', border: 'none', borderLeft: '1px solid var(--line)', cursor: 'pointer', color: 'var(--ink-2)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 1, padding: 0 }}>
                  <span className="kl" style={{ fontSize: 7.5, color: 'var(--ink-3)', letterSpacing: '0.1em' }}>Next</span>
                  <span style={{ fontSize: 18, lineHeight: 1 }}>›</span>
                </button>
              )}
            </div>
            <div style={{ display: 'flex', gap: 6, padding: '0 12px 12px' }}>
              <button onClick={() => window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(c.name + (c.hood ? ' ' + c.hood : '')), '_blank')} className="kl" style={{ flex: 1, background: 'transparent', color: 'var(--ink-2)', border: '1px solid var(--line)', borderRadius: 10, padding: '9px 5px', cursor: 'pointer' }}>Google Maps</button>
              <button onClick={() => jumpNearby(Number(c.lat), Number(c.lng))} className="kl" style={{ flex: 1, background: 'transparent', color: 'var(--ink-2)', border: '1px solid var(--line)', borderRadius: 10, padding: '9px 5px', cursor: 'pointer' }}>Jump Nearby</button>
              <button onClick={() => c.kind === 'shared' ? (onOpenTable && onOpenTable(c.tableId, c.id)) : (onOpenPlace && onOpenPlace(c.id))} className="kl" style={{ flex: 1, background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 10, padding: '9px 5px', cursor: 'pointer' }}>Go to Review</button>
            </div>
          </div>
        )}

        {help && (
          <div style={{ position: 'absolute', inset: 0, background: 'var(--paper)', overflowY: 'auto', padding: '18px 22px 28px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <window.KLabel style={{ color: 'var(--spot)' }}>Using the map</window.KLabel>
              <button onClick={() => setHelp(false)} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--spot)', fontWeight: 600 }}>Done</button>
            </div>
            <div className="serif" style={{ fontSize: 22, fontWeight: 560, color: 'var(--ink)', marginTop: 6, lineHeight: 1.15 }}>How places get here</div>
            <p className="sans" style={{ fontSize: 13.5, color: 'var(--ink-2)', lineHeight: 1.6, marginTop: 8 }}>
              A place appears on the map only when you add it through the <strong>Google search</strong> box in <strong>Log</strong> — that is what saves its location. Typing an address by hand will not place a pin. This works in your own journal and inside a Shared List.
            </p>
            <window.Rule style={{ marginTop: 16 }} />
            <div className="serif" style={{ fontSize: 18, fontWeight: 560, color: 'var(--ink)', marginTop: 16 }}>Reading the pins</div>
            <p className="sans" style={{ fontSize: 13, color: 'var(--ink-3)', lineHeight: 1.6, marginTop: 6 }}>
              Once a place is reviewed, its pin shows the score — the group average on a Shared List, or your own in the journal. <strong style={{ color: '#3E6B4F' }}>Green</strong> means go again, <strong style={{ color: '#C2451E' }}>red</strong> means pass, grey means rated with no verdict yet. Places you haven't reviewed stay as a small cuisine-coloured dot.
            </p>
            <window.Rule style={{ marginTop: 16 }} />
            <div className="serif" style={{ fontSize: 18, fontWeight: 560, color: 'var(--ink)', marginTop: 16 }}>The filters &amp; search</div>
            <p className="sans" style={{ fontSize: 13, color: 'var(--ink-3)', lineHeight: 1.6, marginTop: 6 }}>

function AccountTab({ user, col, profile, setProfile, onStartTour }) {
  // does an image URL actually load? (catches dead storage objects whose URL
  // still looks valid — a string check alone would wrongly call them fine)
  const imgLoads = (url) => new Promise((resolve) => {
    if (!url) return resolve(false);
    const img = new Image();
    let settled = false;
    const done = (ok) => { if (!settled) { settled = true; resolve(ok); } };
    img.onload = () => done(img.naturalWidth > 0);
    img.onerror = () => done(false);
    img.src = url;
    setTimeout(() => done(false), 8000);
  });

  // re-fetch a Google photo for every place (journal + shared lists) whose
  // photo is missing, a Google hotlink, or no longer loads (dead storage file)
  const repairPhotos = async (onProgress) => {
    const broken = async (p) => {
      const ph = (p.photos || [])[0];
      if (!ph) return true;
      if (String(ph).indexOf('googleapis.com') !== -1) return true; // hotlink — localize it
      return !(await imgLoads(ph)); // valid-looking URL, but does it actually load?
    };
    const flagBroken = async (cands) => {
      const flags = await Promise.all(cands.map(broken));
      return cands.filter((p, i) => flags[i]);
    };
    const journalVictims = await flagBroken((col.places || []).filter(p => p.name));
    let sharedVictims = [];
    try {
      const tQ = await window.sb.from('shared_table_members').select('table_id').eq('user_id', user.id);
      const tids = (tQ.data || []).map(r => r.table_id);
      if (tids.length) {
        const sQ = await window.sb.from('shared_places').select('id,name,address,hood,photos').in('table_id', tids);
        sharedVictims = await flagBroken((sQ.data || []).filter(p => p.name));
      }
    } catch (e) { /* tables unreachable — repair the journal at least */ }

    const scanned = journalVictims.length + sharedVictims.length;
    let fixed = 0, done = 0, notFound = 0, blocked = 0, failed = 0, lastErr = null;

    const lookup = async (p) => {
      const r = await window.csvRowsToPlaces(
        [{ name: p.name, address: p.address || p.hood || '' }],
        { photos: true }
      );
      const m = r.places && r.places[0];
      return (m && m.photos && m.photos.length) ? m.photos : null;
    };

    for (const p of journalVictims) {
      try {
        const photos = await lookup(p);
        if (photos) { col.updatePlace(p.id, { photos }); fixed++; }
        else notFound++;
      } catch (e) { failed++; lastErr = (e && e.message) || String(e); }
      done++; onProgress && onProgress(done, scanned, fixed);
    }
    for (const p of sharedVictims) {
      try {
        const dataUrls = await lookup(p);
        if (!dataUrls) { notFound++; }
        else {
          const photos = await window.cloudUploadPhotos(user.id, dataUrls);
          // .select() returns the rows actually changed — an RLS-blocked update
          // "succeeds" with zero rows and no error, so distinguish the cases.
          const { data: upd, error } = await window.sb.from('shared_places').update({ photos }).eq('id', p.id).select('id');
          if (error) { failed++; lastErr = error.message; }
          else if (upd && upd.length) fixed++;
          else blocked++;
        }
      } catch (e) { failed++; lastErr = (e && e.message) || String(e); }
      done++; onProgress && onProgress(done, scanned, fixed);
    }
    return { fixed, scanned, notFound, blocked, failed, lastErr };
  };

  // Backfill opening hours for places saved before the hours feature (or any
  // that never matched). Re-finds each place on Google by name + address.
  const repairHours = async (onProgress) => {
    const needs = (p) => !window.hasHours(p.hours) && p.name;
    const journalVictims = (col.places || []).filter(needs);
    let sharedVictims = [];
    try {
      const tQ = await window.sb.from('shared_table_members').select('table_id').eq('user_id', user.id);
      const tids = (tQ.data || []).map(r => r.table_id);
      if (tids.length) {
        const sQ = await window.sb.from('shared_places').select('id,name,address,hood,hours').in('table_id', tids);
        sharedVictims = (sQ.data || []).filter(needs);
      }
    } catch (e) { /* tables unreachable — backfill the journal at least */ }

    const scanned = journalVictims.length + sharedVictims.length;
    let fixed = 0, done = 0;

    const lookup = async (p) => {
      const q = [p.name, p.address || p.hood || ''].filter(Boolean).join(', ');
      if (!q) return null;
      const g = await window.gTextSearch(q, false, true);
      if (!g) return null;
      const pf = await window.gPlaceToPrefill(g, false, true);
      return pf.hours || null;
    };

    for (const p of journalVictims) {
      try { const hours = await lookup(p); if (hours) { col.updatePlace(p.id, { hours }); fixed++; } } catch (e) {}
      done++; onProgress && onProgress(done, scanned, fixed);
    }
    for (const p of sharedVictims) {
      try {
        const hours = await lookup(p);
        if (hours) {
          const { data: upd, error } = await window.sb.from('shared_places').update({ hours }).eq('id', p.id).select('id');
          if (!error && upd && upd.length) fixed++;
        }
      } catch (e) {}
      done++; onProgress && onProgress(done, scanned, fixed);
    }
    return { fixed, scanned };
  };

  // Backfill the website link for places saved before websites were supported.
  const repairWebsites = async (onProgress) => {
    const needs = (p) => !p.website && p.name;
    const journalVictims = (col.places || []).filter(needs);
    let sharedVictims = [];
    try {
      const tQ = await window.sb.from('shared_table_members').select('table_id').eq('user_id', user.id);
      const tids = (tQ.data || []).map(r => r.table_id);
      if (tids.length) {
        const sQ = await window.sb.from('shared_places').select('id,name,address,hood,website').in('table_id', tids);
        sharedVictims = (sQ.data || []).filter(needs);
      }
    } catch (e) { /* tables unreachable — backfill the journal at least */ }

    const scanned = journalVictims.length + sharedVictims.length;
    let fixed = 0, done = 0;

    const lookup = async (p) => {
      const q = [p.name, p.address || p.hood || ''].filter(Boolean).join(', ');
      if (!q) return null;
      const g = await window.gTextSearch(q, false, false, true);
      if (!g) return null;
      const pf = await window.gPlaceToPrefill(g, false, false, true);
      return pf.website || null;
    };

    for (const p of journalVictims) {
      try { const website = await lookup(p); if (website) { col.updatePlace(p.id, { website }); fixed++; } } catch (e) {}
      done++; onProgress && onProgress(done, scanned, fixed);
    }
    for (const p of sharedVictims) {
      try {
        const website = await lookup(p);
        if (website) {
          const { data: upd, error } = await window.sb.from('shared_places').update({ website }).eq('id', p.id).select('id');
          if (!error && upd && upd.length) fixed++;
        }
      } catch (e) {}
      done++; onProgress && onProgress(done, scanned, fixed);
    }
    return { fixed, scanned };
  };

  return (
    <window.AppSettingsCloud
      hideBack
      onStartTour={onStartTour}
      onRepairPhotos={repairPhotos}
      onRepairHours={repairHours}
      onRepairWebsites={repairWebsites}
      places={col.places}
      userEmail={user.email}
      profile={profile}
      onSaveProfile={async (patch) => { const p = await window.socialApi.saveProfile(user.id, patch); setProfile(p); return p; }}
      onClose={() => {}}
      onImport={(arr) => col.importPlaces(arr)}
      onLoadSamples={() => col.importPlaces(window.cloudSamplePlaces())}
      onClearSamples={() => {
        const names = new Set((window.PLACES || []).map(p => p.name));
        const victims = (col.places || []).filter(p => names.has(p.name));
        col.deletePlaces(victims.map(v => v.id));
        return victims.length;
      }}
      onSignOut={() => window.sb.auth.signOut()} />
  );
}

function TourOverlay({ step, index, count, onNext, onBack, onSkip, onTab, onAction }) {
  const [rect, setRect] = React.useState(null);
  React.useEffect(() => { if (step.tab && onTab) onTab(step.tab); }, [index]);
  React.useEffect(() => {
    const measure = () => {
      const el = step.target ? document.querySelector('[data-tour="' + step.target + '"]') : null;
      setRect(el ? el.getBoundingClientRect() : null);
    };
    const t1 = setTimeout(measure, 70);
    const t2 = setTimeout(measure, 300);
    const onWin = () => measure();
    window.addEventListener('resize', onWin);
    window.addEventListener('scroll', onWin, true);
    return () => { clearTimeout(t1); clearTimeout(t2); window.removeEventListener('resize', onWin); window.removeEventListener('scroll', onWin, true); };
  }, [index, step.target]);

  // keyboard: Esc skips, arrows navigate
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); onSkip(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); onNext(); }
      else if (e.key === 'ArrowLeft' && index > 0) { e.preventDefault(); onBack(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [index, onNext, onBack, onSkip]);

  const tabTarget = !!(step.target && step.target.indexOf('tab-') === 0);
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 1000 }}>
      {rect && (
        <div style={{
          position: 'fixed', left: rect.left - 6, top: rect.top - 6, width: rect.width + 12, height: rect.height + 12,
          border: '2.5px solid var(--spot)', borderRadius: 14, boxSizing: 'border-box', pointerEvents: 'none',
          boxShadow: '0 0 0 3px rgba(194,69,30,0.18), 0 8px 26px rgba(194,69,30,0.34)', transition: 'all 0.25s ease',
        }} />
      )}
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: tabTarget ? 74 : 0 }}>
        <div className="fl sans" style={{ background: 'var(--paper)', borderRadius: tabTarget ? 20 : '20px 20px 0 0', margin: tabTarget ? '0 10px' : 0, padding: '20px 22px calc(20px + env(safe-area-inset-bottom))', boxShadow: '0 8px 40px rgba(0,0,0,0.22)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <window.KLabel style={{ color: 'var(--spot)' }}>{step.kicker || 'Guided tour'}</window.KLabel>
            <button onClick={onSkip} className="kl" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', padding: '4px 0' }}>Skip</button>
          </div>
          <div className="serif" style={{ fontSize: 25, fontWeight: 560, color: 'var(--ink)', letterSpacing: '-0.01em', lineHeight: 1.12, marginTop: 8 }}>{step.title}</div>
          <div className="sans" style={{ fontSize: 14, color: 'var(--ink-2)', lineHeight: 1.6, marginTop: 10 }}>{step.body}</div>
          {step.actions && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7, marginTop: 16 }}>
              {step.actions.map(a => (
                <button key={a.act} onClick={() => onAction && onAction(a.act)} className="kl" style={{
                  flex: '1 1 45%', background: 'var(--spot-soft)', color: 'var(--spot-2)',
                  border: '1px solid rgba(194,69,30,0.28)', borderRadius: 12,
                  padding: '12px 2px', cursor: 'pointer', minWidth: 0,
                }}>{a.label}</button>
              ))}
            </div>
          )}
          <div style={{ display: 'flex', gap: 5, marginTop: 18, justifyContent: 'center' }}>
            {Array.from({ length: count }).map((_, i) => (
              <span key={i} style={{ width: i === index ? 18 : 6, height: 6, borderRadius: 999, background: i === index ? 'var(--spot)' : 'var(--line)', transition: 'width 0.2s ease' }} />
            ))}
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
            {index > 0 && <button onClick={onBack} className="kl" style={{ flex: 1, background: 'transparent', color: 'var(--ink-2)', border: '1px solid var(--line)', borderRadius: 12, padding: '13px 0', cursor: 'pointer' }}>Back</button>}
            <button onClick={onNext} className="kl" style={{ flex: 2, background: 'var(--ink)', color: 'var(--paper)', border: 'none', borderRadius: 12, padding: '13px 0', cursor: 'pointer' }}>{index === count - 1 ? 'Done' : 'Next'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SignedApp({ user }) {
  const col = window.useCloudCollection(user);
  const [profile, setProfile] = React.useState(null);
  const [tables, setTables] = React.useState([]);
  const [lists, setLists] = React.useState([]);
  const [tab, setTab] = React.useState('overview');
  const [chrome, setChrome] = React.useState(true);
  const [pendingPlace, setPendingPlace] = React.useState(null);
  const [pendingTable, setPendingTable] = React.useState(null);
  const [pendingTablePlace, setPendingTablePlace] = React.useState(null); // open this place inside the table
  const [pendingList, setPendingList] = React.useState(null); // open this personal list
  const [pendingLog, setPendingLog] = React.useState(false);
  const [resume, setResume] = React.useState(null);          // "continue where you left off" target
  const locRef = React.useRef(null);                          // the current non-overview location
  const [tour, setTour] = React.useState(null);
  const [pill, setPill] = React.useState(false);
  const [seeding, setSeeding] = React.useState(false);
  const [seeded, setSeeded] = React.useState(false); // samples were added for this tour
  const [fresh, setFresh] = React.useState([]);      // table ids with activity since last seen

  // new-activity check: compare each table's latest place/verdict vs last seen
  React.useEffect(() => {
    const ids = tables.map(t => t.id);
    if (!ids.length) { setFresh([]); return; }
    window.socialApi.fetchTableActivity(ids).then(act => {
      const seen = tableSeenMap();
      setFresh(ids.filter(id => act[id] && (!seen[id] || act[id] > seen[id])));
    }).catch(() => {});
  }, [tables]);

  const seenTable = (id) => { markTableSeen(id); setFresh(f => f.filter(x => x !== id)); };
  React.useEffect(() => { try { setPill(!localStorage.getItem('st7-tour-seen')); } catch (e) {} }, []);

  const refreshTables = React.useCallback(() => window.socialApi.fetchTables().then(ts => { setTables(ts); return ts; }), []);
  const refreshLists = React.useCallback(() => window.socialApi.fetchLists(user.id).then(ls => { setLists(ls); return ls; }), [user.id]);

  React.useEffect(() => {
    window.socialApi.ensureProfile(user).then(p => { setProfile(p); window.setGlobalWeights(p && p.weights); }).catch(() => {});
    refreshTables().catch(() => {});
    refreshLists().catch(() => {});
  }, [user.id]);

  // auto-join a table from an invite link (?join=CODE) — reads the URL
  // directly (already signed in) or the stash left by the sign-in round trip
  React.useEffect(() => {
    let code = null;
    try { code = new URLSearchParams(window.location.search).get('join') || localStorage.getItem('st7-pending-join'); } catch (e) {}
    if (!code) return;
    code = code.toUpperCase();
    try { localStorage.removeItem('st7-pending-join'); } catch (e) {}
    try {
      const u = new URL(window.location);
      if (u.searchParams.has('join')) { u.searchParams.delete('join'); window.history.replaceState({}, '', u); }
    } catch (e) {}
    window.socialApi.joinTable(code)
      .then(async (r) => { await refreshTables(); openTable(r.id); })
      .catch(async () => {
        // probably already a member — find the table by code and open it
        try {
          const ts = await refreshTables();
          const t = (ts || []).find(x => (x.code || '').toUpperCase() === code);
          if (t) openTable(t.id);
        } catch (e) {}
      });
  }, [user.id]);

  const org = {
    lists, tables,
    newList: async (name) => { const l = await window.socialApi.createList(name); await refreshLists(); return l; },
    deleteList: async (id) => { await window.socialApi.deleteList(id); await refreshLists(); },
    setListPublic: async (id, isPublic) => { await window.socialApi.setListPublic(id, isPublic); await refreshLists(); },
    addToList: async (listId, placeId) => { await window.socialApi.addToList(listId, placeId); await refreshLists(); },
    removeFromList: async (listId, placeId) => { await window.socialApi.removeFromList(listId, placeId); await refreshLists(); },
    copyToTable: async (tableId, place) => { await window.socialApi.copyPlaceToTable(tableId, place, user.id); },
    deleteTable: async (id) => { await window.socialApi.deleteTable(id); await refreshTables(); },
    leaveTable: async (id) => { await window.socialApi.leaveTable(id, user.id); await refreshTables(); },
  };

  const selectTab = (t) => { setChrome(true); setTab(t); };
  // remember non-overview locations so "Continue where you left off" can return
  React.useEffect(() => {
    if (tab === 'map') locRef.current = { tab: 'map', label: 'the Map' };
    else if (tab === 'account') locRef.current = { tab: 'account', label: 'Account' };
    // 'tables' reports its own (which list) via onNavigate; 'overview' isn't tracked
  }, [tab]);
  // bottom-tab navigation: snapshot where we were when jumping to Overview
  const goTab = (t) => {
    if (t === 'overview' && tab !== 'overview' && locRef.current && locRef.current.tab !== 'overview') {
      setResume(locRef.current);
    }
    selectTab(t);
  };
  const resumeTo = (r) => {
    if (!r) return;
    setResume(null);
    if (r.tab === 'map') selectTab('map');
    else if (r.tab === 'account') selectTab('account');
    else if (r.tab === 'tables') {
      if (r.kind === 'table') openTable(r.id, r.placeId || null);
      else if (r.kind === 'list') openList(r.id);
      else selectTab('tables');
    }
  };
  const openPlace = (id) => { setChrome(true); setPendingPlace(id); setTab('overview'); };
  const openTable = (id, placeId) => { setChrome(true); setPendingTable(id); setPendingTablePlace(placeId || null); setTab('tables'); };
  const openList = (id) => { setChrome(true); setPendingList(id); setTab('tables'); };
  const startTour = () => { setChrome(true); setTab('overview'); setTour(0); };
  const endTour = () => { setTour(null); setPill(false); try { localStorage.setItem('st7-tour-seen', '1'); } catch (e) {} };
  // seed sample places first so the tour has something to point at
  const startTourWithSamples = async () => {
    setSeeding(true);
    try { await col.importPlaces(window.cloudSamplePlaces()); setSeeded(true); } catch (e) {}
    setSeeding(false);
    startTour();
  };
  // final tour step CTAs: end the tour, land the user mid-action
  const tourAction = (act) => {
    endTour();
    if (act === 'log') { selectTab('overview'); setPendingLog(true); }
    else if (act === 'tables') selectTab('tables');
    else if (act === 'account') selectTab('account');
    else if (act === 'clear-samples') {
      const names = new Set((window.PLACES || []).map(p => p.name));
      col.deletePlaces((col.places || []).filter(p => names.has(p.name)).map(p => p.id));
      setSeeded(false);
      selectTab('overview');
    }
  };

  if (col.places === null) {
    return col.saveError
      ? <window.CloudError message={col.saveError} onRetry={() => col.refetch()} onSignOut={() => window.sb.auth.signOut()} />
      : <window.CloudLoading text="Setting the table…" />;
  }

  // final tour step adapts when demo places were seeded for this tour:
  // explain they're demos and offer one-tap removal
  let tourStep = tour != null ? TOUR_STEPS[tour] : null;
  if (tourStep && tour === TOUR_STEPS.length - 1 && seeded) {
    tourStep = {
      ...tourStep,
      body: <span>The places you just toured are <strong>demos</strong> — remove them in one tap below, or keep exploring and clear them later from <strong>Account → Clear sample places</strong>. Replay the tour anytime from Account.</span>,
      actions: [{ act: 'clear-samples', label: 'Remove sample places' }].concat(tourStep.actions || []),
    };
  }

  let body;
  if (tab === 'overview') {
    body = <JournalSpace user={user} col={col} switcher={null} org={org} onChrome={setChrome} onSettings={() => selectTab('account')} openId={pendingPlace} onConsumed={() => setPendingPlace(null)} openLog={pendingLog} onConsumedLog={() => setPendingLog(false)} onTour={startTour} resume={resume} onResume={resumeTo} onDismissResume={() => setResume(null)} />;
  } else if (tab === 'tables') {
    body = <TablesTab user={user} col={col} tables={tables} lists={lists} org={org} refreshTables={refreshTables} onChrome={setChrome} onOpenAccount={() => selectTab('account')} openTableId={pendingTable} onConsumedTable={() => setPendingTable(null)} openTablePlaceId={pendingTablePlace} onConsumedTablePlace={() => setPendingTablePlace(null)} openListId={pendingList} onConsumedList={() => setPendingList(null)} onNavigate={(loc) => { locRef.current = loc; }} freshIds={fresh} onSeen={seenTable} />;
  } else if (tab === 'map') {
    body = <MapTab user={user} places={col.places} lists={lists} tables={tables} onOpenPlace={openPlace} onOpenTable={openTable} />;
  } else {
    body = <AccountTab user={user} col={col} profile={profile} setProfile={setProfile} onStartTour={startTour} />;
  }

  return (
    <div className="fl" style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <ErrorBanner message={col.saveError} />
      <div style={{ flex: 1, minHeight: 0, position: 'relative', display: 'flex', flexDirection: 'column' }}>
        {tab === 'overview' && chrome && pill && tour == null && (
          <TourPill
            onStart={startTour}
            onStartWithSamples={col.places && col.places.length === 0 ? startTourWithSamples : null}
            busy={seeding}
            onDismiss={endTour} />
        )}
        <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>{body}</div>
        {tab === 'overview' && <UndoBar info={col.undo} onUndo={col.undoDelete} />}
      </div>
      {chrome && <BottomTabs active={tab} onPick={goTab} alert={fresh.length > 0 ? 'tables' : null} />}
      {tourStep && (
        <TourOverlay
          step={tourStep} index={tour} count={TOUR_STEPS.length}
          onTab={selectTab}
          onAction={tourAction}
          onNext={() => (tour >= TOUR_STEPS.length - 1 ? endTour() : setTour(tour + 1))}
          onBack={() => setTour(Math.max(0, tour - 1))}
          onSkip={endTour} />
      )}
    </div>
  );
}

function App() {
  // guide URLs: pretty /g/handle (vercel rewrite) with ?guide=handle still supported
  const pathGuide = (window.location.pathname.match(/^\/g\/([A-Za-z0-9-]+)/) || [])[1];
  const guideHandle = pathGuide || new URLSearchParams(window.location.search).get('guide');
  const [user, setUser] = React.useState(undefined); // undefined = checking session

  // remember a ?join=CODE invite immediately, so it survives the
  // magic-link round trip (the email link comes back without the param)
  React.useEffect(() => {
    const code = new URLSearchParams(window.location.search).get('join');
    if (code) { try { localStorage.setItem('st7-pending-join', code.toUpperCase()); } catch (e) {} }
  }, []);

  React.useEffect(() => {
    if (guideHandle) return;
    window.sb.auth.getSession().then(({ data }) => setUser(data.session ? data.session.user : null));
    const { data: sub } = window.sb.auth.onAuthStateChange((_event, session) => {
      // setTimeout: never touch supabase state synchronously inside this callback (auth lock deadlock)
      setTimeout(() => setUser(session ? session.user : null), 0);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (guideHandle) return <window.GuideView handle={guideHandle} />;
  if (user === undefined) return <window.CloudLoading text="" />;
  if (!user) return <window.CloudSignIn />;
  return <SignedApp user={user} />;
}

function Stage() {
  return (
    <div className="app-stage">
      <div className="app-col" data-screen-label="Food Logger App"><App /><window.PhotoLightbox /></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);
</script>

    });
