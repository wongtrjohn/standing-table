<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Standing Table — Food Logger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=Hanken+Grotesk:wght@400;450;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#ECE8DF; height:100%; }
  * { -webkit-font-smoothing:antialiased; }
  #root { height:100%; }
  /* App column: full-bleed on phones, centered sheet on desktop */
  .app-stage { height:100%; display:flex; justify-content:center; }
  .app-col { width:100%; height:100%; background:#FAF7F0; position:relative; }
  @media (min-width: 560px) {
    .app-stage { padding:28px 0; box-sizing:border-box; }
    .app-col {
      max-width:440px; border:1px solid rgba(28,24,21,0.14); border-radius:18px;
      overflow:hidden; box-shadow:0 12px 40px rgba(28,24,21,0.10);
    }
  }
  input[type="date"] { font-family:"Spline Sans Mono",ui-monospace,monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design tokens, sample data, rating atoms (shared with the design files) -->
<script type="text/babel" src="ds.jsx"></script>
<script type="text/babel" src="photos.jsx"></script>
<script type="text/babel" src="atoms.jsx"></script>

<!-- Working app -->
<script type="text/babel" src="app/store.jsx"></script>
<script type="text/babel" src="app/app-screens.jsx"></script>
<script type="text/babel" src="app/app-form.jsx"></script>

<script type="text/babel">
function App() {
  const col = window.useCollection();
  const [view, setView] = React.useState({ screen: 'pipeline', placeId: null, forceStatus: null });
  const go = (screen, extra) => setView({ screen, placeId: null, forceStatus: null, ...(extra || {}) });

  // First run — nothing seeded yet
  if (col.places === null) {
    return (
      <window.AppWelcome
        onSamples={() => col.seedSamples()}
        onFresh={() => { col.seedEmpty(); go('form'); }} />
    );
  }

  const place = view.placeId ? col.places.find(p => p.id === view.placeId) : null;

  // average scores across reviewed places (for the radar ghost overlay)
  const reviewed = col.places.filter(p => p.s);
  const avgScores = reviewed.length >= 2 ? {
    food: reviewed.reduce((a, p) => a + p.s.food, 0) / reviewed.length,
    value: reviewed.reduce((a, p) => a + p.s.value, 0) / reviewed.length,
    vibe: reviewed.reduce((a, p) => a + p.s.vibe, 0) / reviewed.length,
    service: reviewed.reduce((a, p) => a + p.s.service, 0) / reviewed.length,
  } : null;

  let body;
  if (view.screen === 'form') {
    body = (
      <window.AppForm
        place={place}
        forceStatus={view.forceStatus}
        onSave={(data) => {
          if (place) { col.updatePlace(place.id, data); go('detail', { placeId: place.id }); }
          else { const id = col.addPlace(data); go('detail', { placeId: id }); }
        }}
        onCancel={() => place ? go('detail', { placeId: place.id }) : go('pipeline')} />
    );
  } else if (view.screen === 'detail' && place) {
    body = (
      <window.AppDetail
        place={place}
        avgScores={avgScores}
        onBack={() => go('pipeline')}
        onEdit={() => go('form', { placeId: place.id })}
        onReview={() => go('form', { placeId: place.id, forceStatus: 'reviewed' })}
        onDelete={() => { col.deletePlace(place.id); go('pipeline'); }} />
    );
  } else if (view.screen === 'settings') {
    body = (
      <window.AppSettings
        places={col.places}
        onClose={() => go('pipeline')}
        onImport={(next) => col.replaceAll(next)}
        onLoadSamples={() => col.seedSamples()} />
    );
  } else {
    body = (
      <window.AppPipeline
        places={col.places}
        onOpenPlace={(id) => go('detail', { placeId: id })}
        onLog={() => go('form')}
        onSettings={() => go('settings')} />
    );
  }

  return (
    <div style={{ height: '100%' }}>
      {col.saveError && (
        <div className="sans" style={{
          position: 'fixed', top: 10, left: '50%', transform: 'translateX(-50%)', zIndex: 100,
          background: '#9C3416', color: '#FAF7F0', padding: '9px 16px', borderRadius: 10,
          fontSize: 13, maxWidth: 360, boxShadow: '0 4px 16px rgba(0,0,0,0.2)',
        }}>{col.saveError}</div>
      )}
      {body}
    </div>
  );
}

function Stage() {
  return (
    <div className="app-stage">
      <div className="app-col" data-screen-label="Food Logger App"><App /></div>
    </div>
  );
}

// App must keep its height chain intact: App renders inside app-col (100% height)
ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);
</script>
</body>
</html>
